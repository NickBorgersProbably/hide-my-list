---
name: Review pipeline v2 — entry
# SINGLE entry point for the v2 review pipeline. Listens to PR events
# and `/review` comments. Resolves the head SHA, runs SHA-keyed dedup,
# and dispatches the orchestrator if and only if this run owns the
# SHA. /review, reopen, push, and synchronize all collapse into the
# same path with no per-trigger special-cases.
#
# DORMANCY: every job here gates on `vars.REVIEW_PIPELINE_V2 == 'true'`.
# Until the repo variable is flipped (Phase 3), this workflow runs but
# all jobs short-circuit and the orchestrator is never invoked. The
# legacy codex-code-review.yml continues to own real review work.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  # GITHUB_TOKEN is only used for `actions/checkout@v4` (read) and
  # the `statuses:` updates the entry workflow does directly via
  # the dedup action (which actually authenticates via WORKFLOW_PAT
  # — see comment below).
  #
  # Every actual write operation in the v2 pipeline — posting PR
  # Reviews, pushing fixer commits, applying labels, writing
  # commit statuses — uses `secrets.WORKFLOW_PAT` per
  # agentic-pipeline-learnings.md §2.3, NOT GITHUB_TOKEN. So the
  # GITHUB_TOKEN scopes for the entire reusable graph can stay
  # at minimum-privilege read.
  #
  # GH validates that reusable callees declare a SUBSET of the
  # caller's permissions block, so this read-only declaration
  # forces every downstream review-*.yml to also declare read-only.
  contents: read
  issues: read
  packages: read
  pull-requests: read
  statuses: write

concurrency:
  group: review-entry-v2-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize trigger
    if: vars.REVIEW_PIPELINE_V2 == 'true'
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.authorize.outputs.authorized }}
      pr_number: ${{ steps.authorize.outputs.pr_number }}
      reason: ${{ steps.authorize.outputs.reason }}
    steps:
      - name: Validate trigger, repo origin, and trust level
        id: authorize
        uses: actions/github-script@v7
        with:
          script: |
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;

            const output = (key, value) => core.setOutput(key, String(value ?? ''));
            let authorized = false;
            let prNumber = '';
            let reason = '';

            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = String(pr.number);

              if (pr.head.repo.full_name !== repoFullName) {
                reason = `external-pr:${pr.head.repo.full_name}`;
              } else if (!allowedAssociations.has(pr.author_association)) {
                reason = `pr-author:${pr.author_association}`;
              } else {
                authorized = true;
              }
            } else if (context.eventName === 'issue_comment') {
              const issue = context.payload.issue;
              const comment = context.payload.comment;
              const body = (comment.body || '').trim();

              if (!issue.pull_request) {
                reason = 'not-pr-comment';
              } else if (!/^\/review(?:\s|$)/.test(body)) {
                reason = 'not-review-command';
              } else if (!allowedAssociations.has(comment.author_association)) {
                reason = `comment-author:${comment.author_association}`;
              } else {
                prNumber = String(issue.number);

                const [{ data: issueData }, { data: prData }] = await Promise.all([
                  github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                  }),
                  github.rest.pulls.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: issue.number,
                  }),
                ]);

                if (prData.head.repo.full_name !== repoFullName) {
                  reason = `external-pr:${prData.head.repo.full_name}`;
                } else if (!allowedAssociations.has(issueData.author_association)) {
                  reason = `pr-author:${issueData.author_association}`;
                } else {
                  authorized = true;
                }
              }
            } else {
              reason = `unsupported-event:${context.eventName}`;
            }

            core.info(
              authorized
                ? `review-entry authorized for PR #${prNumber}`
                : `review-entry skipped: ${reason || 'not authorized'}`
            );

            output('authorized', authorized ? 'true' : 'false');
            output('pr_number', prNumber);
            output('reason', reason || 'authorized');

  resolve:
    name: Resolve SHA + dedup claim
    needs: authorize
    if: vars.REVIEW_PIPELINE_V2 == 'true' && needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.dedup.outputs.claimed }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      reviewed_sha: ${{ steps.resolve.outputs.reviewed_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      terminal_verdict: ${{ steps.terminal.outputs.terminal_verdict }}
    steps:
      - name: Checkout main (for composite actions)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve PR + head SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # Pass all event payload fields as env vars rather than
          # inlining them into the script. actionlint flags inline
          # use of github.event.* as a script-injection vector
          # because head.ref / comment.body are user-controlled.
          PR_EVENT_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ISSUE_EVENT_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="$PR_EVENT_NUMBER"
            REVIEWED_SHA="$PR_EVENT_HEAD_SHA"
            HEAD_REF="$PR_EVENT_HEAD_REF"
            HEAD_REPO="$PR_EVENT_HEAD_REPO"
            BASE_SHA="$PR_EVENT_BASE_SHA"
          else
            # issue_comment — must be on a PR with body matching ^/review\b
            if [[ ! "$COMMENT_BODY" =~ ^/review([[:space:]]|$) ]]; then
              echo "review-entry: comment is not /review; nothing to do"
              exit 0
            fi
            PR_NUMBER="$ISSUE_EVENT_NUMBER"
            PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
            REVIEWED_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
            HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
            BASE_SHA=$(echo "$PR_JSON" | jq -r '.base.sha')
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "reviewed_sha=$REVIEWED_SHA"
            echo "head_ref=$HEAD_REF"
            echo "head_repo=$HEAD_REPO"
            echo "base_sha=$BASE_SHA"
          } >> "$GITHUB_OUTPUT"

      # Check whether the reviewed SHA has already been cleared GO by a
      # prior cycle of the v2 pipeline. The finalize job writes the
      # `All Required Agent Reviews` commit status with state=success
      # on GO and state=failure on NO-GO (see review-finalize.yml:76-95).
      # A prior-cycle GO on this exact commit means the pipeline already
      # cleared it; re-running would only rediscover cross-doc drift the
      # last cycle's fixer introduced. NO-GO deliberately does NOT
      # short-circuit — we want the fixer to get additional attempts on
      # stubborn blockers, bounded by the MAX cycle cap in
      # review-pipeline.yml. This asymmetry is the point: "stop on
      # success, keep trying on failure."
      #
      # Only applies to `pull_request` events. `issue_comment` (i.e.
      # `/review`) is the human override and must always force a
      # fresh cycle — see §1.13 in docs/agentic-pipeline-learnings.md.
      - name: Check for prior GO verdict on reviewed SHA
        id: terminal
        if: |
          steps.resolve.outputs.reviewed_sha != '' &&
          github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.resolve.outputs.reviewed_sha }}
        run: |
          set -euo pipefail
          PRIOR=$(gh api "repos/${REPO}/commits/${SHA}/statuses" \
            --jq '[.[] | select(.context == "All Required Agent Reviews" and .state == "success")] | first | .description // empty')
          if [ -n "$PRIOR" ]; then
            echo "review-entry: SHA ${SHA} already cleared GO by a prior cycle (${PRIOR}); skipping re-review (human override: post /review)"
            echo "terminal_verdict=true" >> "$GITHUB_OUTPUT"
          else
            echo "review-entry: SHA ${SHA} has no prior GO verdict; proceeding"
            echo "terminal_verdict=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SHA-keyed dedup claim
        id: dedup
        if: |
          steps.resolve.outputs.reviewed_sha != '' &&
          steps.terminal.outputs.terminal_verdict != 'true'
        uses: ./.github/actions/review-dedup
        with:
          sha: ${{ steps.resolve.outputs.reviewed_sha }}
          context: review/pipeline
          description: 'cycle-claim by review-entry-v2'
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Note dedup result
        if: steps.dedup.outputs.claimed == 'false'
        run: |
          echo "review-entry: SHA already claimed (${{ steps.dedup.outputs.existing_state }}); exiting cleanly"

  pipeline:
    name: Run review pipeline v2
    needs: [authorize, resolve]
    if: |
      vars.REVIEW_PIPELINE_V2 == 'true' &&
      needs.authorize.outputs.authorized == 'true' &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.terminal_verdict != 'true'
    uses: ./.github/workflows/review-pipeline.yml
    with:
      pr_number: ${{ needs.resolve.outputs.pr_number }}
      reviewed_sha: ${{ needs.resolve.outputs.reviewed_sha }}
      head_ref: ${{ needs.resolve.outputs.head_ref }}
      head_repo: ${{ needs.resolve.outputs.head_repo }}
      base_sha: ${{ needs.resolve.outputs.base_sha }}
    secrets:
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
