name: Codex Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, reopened]
  pull_request_review:
    types: [submitted]

# SECURITY NOTE: This workflow grants the Codex agent access to secrets and write permissions.
# Authorization checks are implemented to prevent prompt injection from untrusted users.
# Only repository collaborators, members, and owners can trigger Codex.

# Prevent duplicate runs for the same issue/PR. New runs cancel in-progress ones.
concurrency:
  group: codex-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Note: must be lowercase for Docker compatibility
  DEVCONTAINER_IMAGE: ghcr.io/nickborgersprobably/hide-my-list-devcontainer

jobs:
  # Security gate: Check if the actor is authorized to trigger Codex
  # This prevents prompt injection attacks from untrusted external users
  authorize:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check-auth.outputs.authorized }}
    steps:
      - name: Check authorization
        id: check-auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the author association based on event type
          EVENT_NAME="${{ github.event_name }}"

          case "$EVENT_NAME" in
            issue_comment)
              AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
              ACTOR="${{ github.event.comment.user.login }}"
              ;;
            pull_request_review_comment)
              AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
              ACTOR="${{ github.event.comment.user.login }}"
              ;;
            pull_request_review)
              AUTHOR_ASSOC="${{ github.event.review.author_association }}"
              ACTOR="${{ github.event.review.user.login }}"
              ;;
            issues)
              AUTHOR_ASSOC="${{ github.event.issue.author_association }}"
              ACTOR="${{ github.event.issue.user.login }}"
              ;;
            *)
              echo "Unknown event type: $EVENT_NAME"
              echo "authorized=false" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          echo "Event: $EVENT_NAME"
          echo "Actor: $ACTOR"
          echo "Author association: $AUTHOR_ASSOC"

          # Allow: OWNER, MEMBER, COLLABORATOR
          # Deny: CONTRIBUTOR, FIRST_TIMER, FIRST_TIME_CONTRIBUTOR, MANNEQUIN, NONE
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Authorized: $ACTOR is a $AUTHOR_ASSOC"
              echo "authorized=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Not authorized: $ACTOR is a $AUTHOR_ASSOC"
              echo "External users cannot trigger Codex workflows."
              echo "This is a security measure to prevent prompt injection attacks."
              echo "authorized=false" >> $GITHUB_OUTPUT
              ;;
          esac

  detect_codex_invocation:
    runs-on: ubuntu-latest
    outputs:
      codex_requested: ${{ steps.detect.outputs.codex_requested }}
      request_text_b64: ${{ steps.detect.outputs.request_text_b64 }}
      issue_title_b64: ${{ steps.detect.outputs.issue_title_b64 }}
    steps:
      - name: Detect explicit Codex invocation
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -eu

          # Treat @codex as explicit only when it starts a line.
          # This avoids triggering on incidental mentions in prose or logs.
          explicit_invocation() {
            printf '%s\n' "$1" | grep -Eq '^[[:space:]]*@codex([[:space:]]|$|[[:punct:]])'
          }

          REQUEST_TEXT=""
          INVOCATION_TEXT=""

          case "$EVENT_NAME" in
            issue_comment|pull_request_review_comment)
              REQUEST_TEXT="${COMMENT_BODY:-}"
              INVOCATION_TEXT="$REQUEST_TEXT"
              ;;
            pull_request_review)
              REQUEST_TEXT="${REVIEW_BODY:-}"
              INVOCATION_TEXT="$REQUEST_TEXT"
              ;;
            issues)
              REQUEST_TEXT="${ISSUE_TITLE:-}"
              if [ -n "${ISSUE_BODY:-}" ]; then
                REQUEST_TEXT="${REQUEST_TEXT}"$'\n\n'"${ISSUE_BODY}"
              fi
              INVOCATION_TEXT="$REQUEST_TEXT"
              ;;
            *)
              ;;
          esac

          if explicit_invocation "$INVOCATION_TEXT"; then
            echo "codex_requested=true" >> "$GITHUB_OUTPUT"
          else
            echo "codex_requested=false" >> "$GITHUB_OUTPUT"
          fi

          printf 'request_text_b64=%s\n' "$(printf '%s' "$REQUEST_TEXT" | base64 -w0)" >> "$GITHUB_OUTPUT"
          printf 'issue_title_b64=%s\n' "$(printf '%s' "${ISSUE_TITLE:-}" | base64 -w0)" >> "$GITHUB_OUTPUT"
  preflight:
    needs: authorize
    if: needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-latest
    outputs:
      is_pr: ${{ steps.pr-context.outputs.is_pr }}
      pr_number: ${{ steps.pr-context.outputs.pr_number }}
      pr_head_ref: ${{ steps.pr-context.outputs.pr_head_ref }}
      should_run: ${{ steps.pr-context.outputs.should_run }}
      skip_reason: ${{ steps.pr-context.outputs.skip_reason }}
      checkout_ref: ${{ steps.pr-context.outputs.checkout_ref }}
    steps:
      - name: Get PR context
        id: pr-context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine whether this run targets an active PR and which ref is safe to check out.
          IS_PR="false"
          PR_HEAD_REF=""
          PR_NUMBER=""
          SHOULD_RUN="true"
          SKIP_REASON=""
          CHECKOUT_REF="${{ github.event.repository.default_branch }}"

          if [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            IS_PR="true"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            IS_PR="true"
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Check if the issue is actually a PR
            if [ -n "${{ github.event.issue.pull_request }}" ]; then
              IS_PR="true"
              PR_NUMBER="${{ github.event.issue.number }}"
            fi
          fi

          if [ "$IS_PR" = "true" ]; then
            PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER})
            PR_STATE=$(printf '%s' "$PR_JSON" | jq -r '.state')
            PR_MERGED_AT=$(printf '%s' "$PR_JSON" | jq -r '.merged_at // empty')
            PR_HEAD_REF=$(printf '%s' "$PR_JSON" | jq -r '.head.ref // empty')

            if [ "$PR_STATE" != "open" ] || [ -n "$PR_MERGED_AT" ]; then
              SHOULD_RUN="false"
              SKIP_REASON="PR #${PR_NUMBER} is not active (state=${PR_STATE}, merged_at=${PR_MERGED_AT:-not-merged})"
            elif [ -z "$PR_HEAD_REF" ]; then
              SHOULD_RUN="false"
              SKIP_REASON="PR #${PR_NUMBER} does not have a head branch ref"
            else
              HEAD_EXISTS=$(gh api "repos/${{ github.repository }}/git/matching-refs/heads/${PR_HEAD_REF}" --jq 'length > 0')
              if [ "$HEAD_EXISTS" = "true" ]; then
                CHECKOUT_REF="$PR_HEAD_REF"
              else
                SHOULD_RUN="false"
                SKIP_REASON="PR #${PR_NUMBER} head branch '${PR_HEAD_REF}' no longer exists on origin"
              fi
            fi
          fi

          echo "is_pr=$IS_PR" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_head_ref=$PR_HEAD_REF" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "skip_reason=$SKIP_REASON" >> $GITHUB_OUTPUT
          echo "checkout_ref=$CHECKOUT_REF" >> $GITHUB_OUTPUT
          echo "Detected: IS_PR=$IS_PR, PR_NUMBER=$PR_NUMBER, PR_HEAD_REF=$PR_HEAD_REF, SHOULD_RUN=$SHOULD_RUN, CHECKOUT_REF=$CHECKOUT_REF"

  # Build and cache devcontainer image first
  # Only build when a downstream job (codex or resolve-issue) will actually run.
  # Without this gate, every PR review comment triggers a wasted devcontainer build.
  build-devcontainer:
    needs: [authorize, detect_codex_invocation, preflight]
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      needs.preflight.outputs.should_run == 'true' &&
      (
        (github.event_name == 'issues') ||
        needs.detect_codex_invocation.outputs.codex_requested == 'true'
      )
    runs-on: [self-hosted, homelab]
    permissions:
      contents: read
      packages: write

    steps:
      # SECURITY: Checkout main branch, NOT the PR branch
      - name: Checkout main branch (security measure)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ${{ env.DEVCONTAINER_IMAGE }}
          cacheFrom: ${{ env.DEVCONTAINER_IMAGE }}
          platform: linux/amd64
          push: always

  codex:
    needs: [authorize, detect_codex_invocation, preflight, build-devcontainer]
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      needs.preflight.outputs.should_run == 'true' &&
      needs.detect_codex_invocation.outputs.codex_requested == 'true'
    runs-on: [self-hosted, homelab]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      packages: read

    steps:
      - name: Add eyes reaction to acknowledge comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
              -f content='eyes' || echo "Warning: reaction failed"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }}/reactions \
              -f content='eyes' || echo "Warning: reaction failed"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "Note: GitHub API does not support reactions on PR reviews"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}  # PAT required to push workflow file changes
          ref: ${{ needs.preflight.outputs.checkout_ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Note: GH_TOKEN uses WORKFLOW_PAT because PRs created with GITHUB_TOKEN don't trigger workflows
      - name: Run Codex in devcontainer
        # yamllint disable rule:line-length
        uses: NickBorgersProbably/hide-my-list/.github/actions/run-devcontainer@9b30c0f3171a22cb4c76ef6bb8e58e28e46690c8
        # yamllint enable rule:line-length
        with:
          image: ${{ env.DEVCONTAINER_IMAGE }}
          pull: 'true'
          env: |
            OPENAI_API_KEY=fake-key
            GH_TOKEN=${{ secrets.WORKFLOW_PAT }}
            COMMENT_BODY_B64=${{ needs.detect_codex_invocation.outputs.request_text_b64 }}
            EVENT_NAME=${{ github.event_name }}
            COMMENT_ID=${{ github.event.comment.id }}
            REVIEW_ID=${{ github.event.review.id }}
            ISSUE_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
            REPO=${{ github.repository }}
            IS_PR=${{ needs.preflight.outputs.is_pr }}
            PR_HEAD_REF=${{ needs.preflight.outputs.pr_head_ref }}
          run_cmd: |
            source .devcontainer/configure-codex.sh
            COMMENT_BODY=$(printf '%s' "$COMMENT_BODY_B64" | base64 -d 2>/dev/null || echo "")

            fetch_event_body() {
              case "$EVENT_NAME" in
                issue_comment)
                  gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" --jq '.body // ""'
                  ;;
                pull_request_review_comment)
                  gh api "repos/${REPO}/pulls/comments/${COMMENT_ID}" --jq '.body // ""'
                  ;;
                pull_request_review)
                  gh api "repos/${REPO}/pulls/${ISSUE_NUMBER}/reviews/${REVIEW_ID}" --jq '.body // ""'
                  ;;
                issues)
                  gh api "repos/${REPO}/issues/${ISSUE_NUMBER}" --jq '.body // ""'
                  ;;
                *)
                  echo "Unsupported event type: ${EVENT_NAME}" >&2
                  return 1
                  ;;
              esac
            }

            COMMENT_BODY="$(fetch_event_body)"

            # Build the prompt based on whether this is a PR or issue comment
            # Instead of fetching all context inline, instruct Codex to read it via gh CLI.
            # This avoids pagination limits, prompt size bloat, and comment duplication.
            if [ "$IS_PR" = "true" ]; then
              PROMPT="You are an autonomous agent responding to a request on PR #${ISSUE_NUMBER} in ${REPO}.

            The user said: ${COMMENT_BODY}

            YOUR TASK: IMPLEMENT the requested changes. Do NOT just provide review comments or suggestions.

            WORKFLOW:
            1. Read the user's request carefully
            2. If they reference another comment, fetch it: gh api repos/${REPO}/issues/${ISSUE_NUMBER}/comments
            3. Understand what changes are needed
            4. Implement the changes in the code
            5. Run \`shellcheck scripts/*.sh\` and \`yamllint .github/workflows/*.yml\` to verify your changes
            6. Commit your changes with a descriptive message
            7. Push to the PR branch: git push origin ${PR_HEAD_REF}
            8. Post a summary comment: gh pr comment ${ISSUE_NUMBER} --body 'YOUR_SUMMARY'

            IMPORTANT RULES FOR THIS REPOSITORY:
            - This is an OpenClaw agent project, not a compiled application
            - Use \`shellcheck scripts/*.sh\` for shell script linting
            - Use \`yamllint .github/workflows/*.yml\` for workflow validation
            - Check documentation links are not broken
            - Reference docs/architecture.md for system design context
            - Never use \`git push --no-verify\`

            You are on branch ${PR_HEAD_REF}. Make the changes, commit, and push them."
            else
              PROMPT="You are responding to a request in ${REPO} issue #${ISSUE_NUMBER}.

            The user said: ${COMMENT_BODY}

            WORKFLOW:
            1. Read the user's request carefully
            2. Fetch the full issue for context: gh api repos/${REPO}/issues/${ISSUE_NUMBER}
            3. If needed, fetch issue comments: gh api repos/${REPO}/issues/${ISSUE_NUMBER}/comments
            4. Implement the requested changes
            5. Run \`shellcheck scripts/*.sh\` and \`yamllint .github/workflows/*.yml\` to verify your changes
            6. Create a branch, commit your changes, and open a PR

            IMPORTANT RULES FOR THIS REPOSITORY:
            - This is an OpenClaw agent project, not a compiled application
            - Use \`shellcheck scripts/*.sh\` for shell script linting
            - Use \`yamllint .github/workflows/*.yml\` for workflow validation
            - Check documentation links are not broken
            - Reference docs/architecture.md for system design context
            - Never use \`git push --no-verify\`

            Complete the user's request. If you make changes, create a branch, commit them, and open a PR.
            BEFORE creating a new PR, check if one already exists for this issue:
              gh pr list --state open --search 'Resolves #${ISSUE_NUMBER} OR Fixes #${ISSUE_NUMBER} OR Closes #${ISSUE_NUMBER}'
            If a PR already exists, push changes to that PR's branch instead of creating a new one.
            Reply to the user using: gh issue comment ${ISSUE_NUMBER} --body 'YOUR_RESPONSE'"
            fi

            timeout 60m codex exec \
              --json \
              --dangerously-bypass-approvals-and-sandbox \
              "$PROMPT" < /dev/null 2>&1 | tee /tmp/codex-conversation.jsonl

      - name: Upload Codex conversation log
        uses: actions/upload-artifact@v4
        if: always() && needs.preflight.outputs.should_run == 'true'
        continue-on-error: true
        with:
          name: codex-conversation-log
          path: /tmp/codex-conversation.jsonl
          retention-days: 7

  # Auto-resolve new issues by opening a PR
  resolve-issue:
    needs: [authorize, detect_codex_invocation, build-devcontainer]
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'reopened')
    runs-on: [self-hosted, homelab]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}  # PAT required to push workflow file changes

      - name: Check for existing PR
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          # Search for open PRs whose body contains "Resolves #N", "Fixes #N", or "Closes #N"
          EXISTING=$(gh pr list --state open --search "Resolves #${ISSUE_NUM} OR Fixes #${ISSUE_NUM} OR Closes #${ISSUE_NUM}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already targets issue #${ISSUE_NUM}, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No existing PR found for issue #${ISSUE_NUM}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Label issue as codex-started
        if: steps.check-existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create the label if it doesn't exist (ignore error if it does)
          gh label create "codex-started" --color "7057ff" --description "Codex is working on this issue" --repo ${{ github.repository }} 2>/dev/null || true
          # Add the label to the issue
          gh issue edit ${{ github.event.issue.number }} --add-label "codex-started" --repo ${{ github.repository }}

      - name: Log in to GHCR
        if: steps.check-existing.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Note: GH_TOKEN uses WORKFLOW_PAT because PRs created with GITHUB_TOKEN don't trigger workflows
      - name: Resolve issue in devcontainer
        if: steps.check-existing.outputs.skip != 'true'
        # yamllint disable rule:line-length
        uses: NickBorgersProbably/hide-my-list/.github/actions/run-devcontainer@9b30c0f3171a22cb4c76ef6bb8e58e28e46690c8
        # yamllint enable rule:line-length
        with:
          image: ${{ env.DEVCONTAINER_IMAGE }}
          pull: 'true'
          env: |
            OPENAI_API_KEY=fake-key
            GH_TOKEN=${{ secrets.WORKFLOW_PAT }}
            ISSUE_NUMBER=${{ github.event.issue.number }}
            ISSUE_TITLE_B64=${{ needs.detect_codex_invocation.outputs.issue_title_b64 }}
            REPO=${{ github.repository }}
          run_cmd: |
            source .devcontainer/configure-codex.sh
            ISSUE_TITLE=$(printf '%s' "$ISSUE_TITLE_B64" | base64 -d 2>/dev/null || echo "")

            timeout 60m codex exec \
              --json \
              --dangerously-bypass-approvals-and-sandbox \
              "You are an autonomous agent tasked with resolving GitHub issue #${ISSUE_NUMBER} in ${REPO}.

            ISSUE TITLE: ${ISSUE_TITLE}

            YOUR TASK:
            1. Fetch the full issue for context: gh api repos/${REPO}/issues/${ISSUE_NUMBER}
            2. If needed, fetch issue comments: gh api repos/${REPO}/issues/${ISSUE_NUMBER}/comments
            3. Analyze the issue and understand what needs to be done
            4. Explore the codebase to find relevant files
            5. Implement the fix or feature
            6. Run \`shellcheck scripts/*.sh\` and \`yamllint .github/workflows/*.yml\` to verify your changes
            7. Create a branch, commit your changes, and open a PR

            IMPORTANT RULES:
            - This is an OpenClaw agent project, not a compiled application
            - Use \`shellcheck scripts/*.sh\` for shell script linting
            - Use \`yamllint .github/workflows/*.yml\` for workflow validation
            - Check documentation links are not broken
            - Reference docs/architecture.md for system design context
            - Never use \`git push --no-verify\`

            BRANCH NAMING: Use \`codex/issue-${ISSUE_NUMBER}\` as the branch name.

            PR CREATION:
            gh pr create --title '<brief description of what this PR accomplishes>' \\
              --assignee NickBorgers \\
              --body 'Resolves #${ISSUE_NUMBER}

            ## Summary
            <describe what you changed>

            ## Test Plan
            <how to verify the fix>

            Generated with Codex' \\
              --head codex/issue-${ISSUE_NUMBER}

            If you cannot resolve the issue (unclear requirements, needs human decision, etc.),
            comment on the issue explaining what clarification is needed:
            gh issue comment ${ISSUE_NUMBER} --body 'YOUR_EXPLANATION'" < /dev/null 2>&1 | tee /tmp/resolve-issue-conversation.jsonl

      - name: Upload issue resolution conversation log
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: resolve-issue-conversation-log
          path: /tmp/resolve-issue-conversation.jsonl
          retention-days: 7
