---
name: Review pipeline v2 — entry
# SINGLE entry point for the v2 review pipeline. Listens to PR events
# and `/review` comments. Resolves the head SHA, runs SHA-keyed dedup,
# and dispatches the orchestrator if and only if this run owns the
# SHA. /review, reopen, push, and synchronize all collapse into the
# same path with no per-trigger special-cases.
#
# DORMANCY: every job here gates on `vars.REVIEW_PIPELINE_V2 == 'true'`.
# Until the repo variable is flipped (Phase 3), this workflow runs but
# all jobs short-circuit and the orchestrator is never invoked. The
# legacy codex-code-review.yml continues to own real review work.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: review-entry-v2-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve SHA + authorize + dedup claim
    if: vars.REVIEW_PIPELINE_V2 == 'true'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.dedup.outputs.claimed }}
      authorized: ${{ steps.authorize.outputs.authorized }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      reviewed_sha: ${{ steps.resolve.outputs.reviewed_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
    steps:
      - name: Checkout main (for composite actions)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve PR + head SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # Pass all event payload fields as env vars rather than
          # inlining them into the script. actionlint flags inline
          # use of github.event.* as a script-injection vector
          # because head.ref / comment.body are user-controlled.
          PR_EVENT_NUMBER: ${{ github.event.pull_request.number }}
          PR_EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          ISSUE_EVENT_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER="$PR_EVENT_NUMBER"
            REVIEWED_SHA="$PR_EVENT_HEAD_SHA"
            HEAD_REF="$PR_EVENT_HEAD_REF"
            HEAD_REPO="$PR_EVENT_HEAD_REPO"
            BASE_SHA="$PR_EVENT_BASE_SHA"
          else
            # issue_comment — must be on a PR with body matching ^/review\b
            if [[ ! "$COMMENT_BODY" =~ ^/review([[:space:]]|$) ]]; then
              echo "review-entry: comment is not /review; nothing to do"
              exit 0
            fi
            PR_NUMBER="$ISSUE_EVENT_NUMBER"
            PR_JSON=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
            REVIEWED_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
            HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
            BASE_SHA=$(echo "$PR_JSON" | jq -r '.base.sha')
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "reviewed_sha=$REVIEWED_SHA"
            echo "head_ref=$HEAD_REF"
            echo "head_repo=$HEAD_REPO"
            echo "base_sha=$BASE_SHA"
          } >> "$GITHUB_OUTPUT"

      # SECURITY GATE — must run BEFORE the dedup claim, BEFORE the
      # pipeline reusable workflow, and BEFORE WORKFLOW_PAT touches
      # anything else. Mirrors the v1 admission control in
      # codex-code-review.yml lines 509-563. Honors
      # agentic-pipeline-learnings.md §2.4: external fork PRs MUST
      # NOT run Codex review on self-hosted runners with credentials.
      #
      # Rules (deny by default):
      #   1. PR head.repo MUST equal base.repo (no forks).
      #   2. PR author association MUST be OWNER, MEMBER, or COLLABORATOR.
      #   3. For /review comments: the COMMENTER's association ALSO must
      #      be OWNER, MEMBER, or COLLABORATOR (someone outside the trust
      #      boundary cannot trigger a review by commenting).
      #
      # On any failure: emit authorized=false, post one explainer
      # comment, exit cleanly without writing the dedup claim.
      - name: Authorize PR and (if applicable) commenter
        id: authorize
        if: steps.resolve.outputs.reviewed_sha != ''
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          HEAD_REPO: ${{ steps.resolve.outputs.head_repo }}
          # Pull associations from event payload via env vars; do not
          # inline ${{ github.event.* }} into shell (script-injection).
          PR_EVENT_AUTHOR_ASSOC: ${{ github.event.pull_request.author_association }}
          COMMENT_AUTHOR_ASSOC: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail

          DENY_REASON=""

          # (1) Same-repo check.
          if [ "$HEAD_REPO" != "$REPO" ]; then
            DENY_REASON="PR head repo ($HEAD_REPO) is not $REPO (fork PR)"
          fi

          # Look up the authoritative PR author association from the API
          # (the event payload value can be stale/missing for re-runs).
          if [ -z "$DENY_REASON" ]; then
            PR_DATA=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
            PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.user.login')
            PR_AUTHOR_ASSOC=$(echo "$PR_DATA" | jq -r '.author_association')

            case "$PR_AUTHOR_ASSOC" in
              OWNER|MEMBER|COLLABORATOR) ;;
              *) DENY_REASON="PR author $PR_AUTHOR has association $PR_AUTHOR_ASSOC (must be OWNER|MEMBER|COLLABORATOR)" ;;
            esac
          fi

          # (3) For /review comments, the commenter must also be authorized.
          if [ -z "$DENY_REASON" ] && [ "$EVENT_NAME" = "issue_comment" ]; then
            case "$COMMENT_AUTHOR_ASSOC" in
              OWNER|MEMBER|COLLABORATOR) ;;
              *) DENY_REASON="/review commenter has association $COMMENT_AUTHOR_ASSOC (must be OWNER|MEMBER|COLLABORATOR)" ;;
            esac
          fi

          if [ -n "$DENY_REASON" ]; then
            echo "::warning::review-entry: authorization denied — $DENY_REASON"
            echo "authorized=false" >> "$GITHUB_OUTPUT"

            # One-shot explainer comment. Continue past failures so
            # auth-denied reruns don't spam comments if the PR has been
            # commented on already.
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "## Review pipeline v2 — skipped

          $DENY_REASON.

          For security reasons, the agentic review pipeline only runs for
          repository collaborators, members, and owners on same-repo PRs.
          This prevents prompt-injection and credential exfiltration on
          self-hosted runners (see \\\`docs/agentic-pipeline-learnings.md\\\` §2.4).

          A repository maintainer can review this PR manually." 2>/dev/null || true

            exit 0
          fi

          echo "review-entry: authorization passed"
          echo "authorized=true" >> "$GITHUB_OUTPUT"

      - name: SHA-keyed dedup claim
        id: dedup
        if: steps.authorize.outputs.authorized == 'true'
        uses: ./.github/actions/review-dedup
        with:
          sha: ${{ steps.resolve.outputs.reviewed_sha }}
          context: review/pipeline
          description: 'cycle-claim by review-entry-v2'
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Note dedup result
        if: steps.dedup.outputs.claimed == 'false'
        run: |
          echo "review-entry: SHA already claimed (${{ steps.dedup.outputs.existing_state }}); exiting cleanly"

  pipeline:
    name: Run review pipeline v2
    needs: resolve
    # Defense in depth: gate on the variable, the auth output, AND
    # the dedup claim. Any one of these short-circuits the dispatch.
    if: |
      vars.REVIEW_PIPELINE_V2 == 'true' &&
      needs.resolve.outputs.authorized == 'true' &&
      needs.resolve.outputs.should_run == 'true'
    uses: ./.github/workflows/review-pipeline.yml
    with:
      pr_number: ${{ needs.resolve.outputs.pr_number }}
      reviewed_sha: ${{ needs.resolve.outputs.reviewed_sha }}
      head_ref: ${{ needs.resolve.outputs.head_ref }}
      head_repo: ${{ needs.resolve.outputs.head_repo }}
      base_sha: ${{ needs.resolve.outputs.base_sha }}
    secrets:
      WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
