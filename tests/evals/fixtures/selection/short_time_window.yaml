---
# Selection scenario: user reports a small time window. The selection
# node must suggest a task that's plausibly doable in that window and
# articulate a reason. Catches Phase B regressions where the cheaper
# model picks any task without scoring.
id: selection-short-window-001
node: selection
tier: expensive
peer: "<test-peer-5>"
inbound: "I have 15 minutes — what should I do?"
prior_state:
  active_task: null
  conversation_state: idle
  available_minutes: 15
  user_prefs:
    timezone: America/Chicago
# Candidate pool read via notion.query_pending(). Mixed durations so the
# 15-minute window is a real constraint the model has to respect rather
# than a trivially-satisfied one.
notion_tasks:
  - id: "<placeholder-page-id-1>"
    title: "Draft the quarterly summary"
    work_type: "Deep Work"
    energy_required: "High"
    time_estimate: 90
  - id: "<placeholder-page-id-2>"
    title: "Water the office plants"
    work_type: "Physical"
    energy_required: "Low"
    time_estimate: 10
  - id: "<placeholder-page-id-3>"
    title: "Reconcile the expense report"
    work_type: "Admin"
    energy_required: "Medium"
    time_estimate: 45
contracts:
  - kind: shame_safe
    threshold: 0.8
  - kind: judge
    rubric: |
      The response offers exactly one task suggestion that plausibly
      fits a 15-minute window. It does NOT dump a list of options.
      It includes a brief why (e.g., energy fit, time fit, mood).
      Score 1.0 for all three, 0.5 for two, 0.0 for one or none.
    threshold: 0.7
