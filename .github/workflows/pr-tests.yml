name: PR Tests

# SECURITY NOTE: This workflow runs on GitHub-hosted runners (ubuntu-latest).
# Fork PRs are blocked to prevent unnecessary CI consumption and to maintain
# the same-repo-only policy for test execution.
#
# Security model:
# - GitHub-hosted runners: safe for untrusted code (ephemeral VMs)
# - READ-ONLY permissions (contents: read, pull-requests: read)
# - No secrets are exposed to PR builds
# - pull_request trigger covers all branches targeting main (including codex/**)
# - workflow_dispatch requires write access
# - Fork PR check retained for consistency and to avoid wasting CI minutes
#
# External contributors: A maintainer must manually test fork PRs.
#
# INVARIANT: Every job must either (a) transitively depend on `changes` (which
# blocks forks), or (b) include the fork check in its own `if` condition.
# The `all-tests-passed` job uses `if: always()` which bypasses dependency
# skipping, so it needs the fork check directly.

on:
  pull_request:
    branches:
      - main
      - master
      - '**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to test (branch name or SHA)'
        required: false
        type: string

concurrency:
  group: pr-tests-${{ github.event.pull_request.head.ref || github.ref_name }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
      docs: ${{ steps.filter.outputs.docs }}
      docs_files: ${{ steps.filter.outputs.docs_files }}
      workflows: ${{ steps.filter.outputs.workflows }}
      devcontainer: ${{ steps.filter.outputs.devcontainer }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          list-files: json
          filters: |
            scripts:
              - 'scripts/**'
              - 'setup/*.sh'
              - '.githooks/**'
            docs:
              - 'docs/**'
              - 'design/**'
              - 'setup/**/*.md'
              - 'README.md'
              - 'AGENTS.md'
              - 'scripts/check-doc-links.sh'
              - 'scripts/lint-mermaid-rendering.sh'
              - 'scripts/validate-mermaid.sh'
              - 'scripts/run-required-checks.sh'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.github/actionlint.yaml'
              - '.yamllint'
              - '.githooks/**'
              - 'scripts/run-required-checks.sh'
              - 'scripts/validate-pr-tests-workflow.sh'
              - 'scripts/validate-gh-cli-usage.sh'
              - 'scripts/validate-workflow-refs.sh'
            devcontainer:
              - '.devcontainer/**'

  script-validation:
    name: Script Validation
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run script validation
        run: ./scripts/run-required-checks.sh ci-scripts

  doc-validation:
    name: Documentation Validation
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid validation tools
        run: npm install -g mermaid@11 jsdom@25 dompurify@3

      - name: Run doc validation
        env:
          DOCS_FILES_JSON: ${{ needs.changes.outputs.docs_files }}
        run: |
          RUN_REQUIRED_CHECKS_CHANGED_FILES="$(
            node -e 'JSON.parse(process.env.DOCS_FILES_JSON).forEach((path) => console.log(path))'
          )"
          export RUN_REQUIRED_CHECKS_CHANGED_FILES
          ./scripts/run-required-checks.sh ci-docs

  workflow-validation:
    name: Workflow YAML Validation
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip3 install yamllint

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION=1.7.7
          ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          CHECKSUMS="actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          BASE_URL="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT

          curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "${TMP_DIR}/${ARCHIVE}"
          curl -fsSL "${BASE_URL}/${CHECKSUMS}" -o "${TMP_DIR}/${CHECKSUMS}"
          (
            cd "${TMP_DIR}"
            grep " ${ARCHIVE}$" "${CHECKSUMS}" | sha256sum -c -
          )
          sudo tar -xzf "${TMP_DIR}/${ARCHIVE}" -C /usr/local/bin actionlint

      - name: Run workflow validation
        run: ./scripts/run-required-checks.sh ci-workflows

  devcontainer-validation:
    name: Devcontainer Build Check
    needs: changes
    if: needs.changes.outputs.devcontainer == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate devcontainer configuration
        run: npx -y @devcontainers/cli@0.85.0 build --workspace-folder .

  all-tests-passed:
    name: All Required Tests
    runs-on: ubuntu-latest
    needs: [changes, script-validation, doc-validation, workflow-validation, devcontainer-validation]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)

    steps:
      - name: Check test results
        run: |
          check_result() {
            local result=$1
            [[ "$result" == "success" || "$result" == "skipped" ]]
          }

          failed=false

          if ! check_result "${{ needs.script-validation.result }}"; then
            echo "Script Validation: ${{ needs.script-validation.result }}"
            failed=true
          fi
          if ! check_result "${{ needs.doc-validation.result }}"; then
            echo "Doc Validation: ${{ needs.doc-validation.result }}"
            failed=true
          fi
          if ! check_result "${{ needs.workflow-validation.result }}"; then
            echo "Workflow Validation: ${{ needs.workflow-validation.result }}"
            failed=true
          fi
          if ! check_result "${{ needs.devcontainer-validation.result }}"; then
            echo "Devcontainer Build Check: ${{ needs.devcontainer-validation.result }}"
            failed=true
          fi

          if [ "$failed" = true ]; then
            echo ""
            echo "Some required tests failed"
            exit 1
          fi

          echo "All required tests passed"
          echo ""
          echo "Job Results:"
          echo "  Script Validation: ${{ needs.script-validation.result }}"
          echo "  Doc Validation: ${{ needs.doc-validation.result }}"
          echo "  Workflow Validation: ${{ needs.workflow-validation.result }}"
          echo "  Devcontainer Build Check: ${{ needs.devcontainer-validation.result }}"
