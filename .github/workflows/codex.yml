name: Issue Resolution Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, reopened, unlabeled]

# SECURITY NOTE: This workflow grants the AI agent access to secrets and write permissions.
# Authorization checks are implemented to prevent prompt injection from untrusted users.
# Only repository collaborators, members, and owners can trigger the agent.

# Prevent duplicate runs for the same issue. New runs cancel in-progress ones.
concurrency:
  group: autoresolve-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  # CI agent image — see .github/ci/Dockerfile + .github/workflows/ci-image.yml
  CI_IMAGE: ghcr.io/nickborgersprobably/hide-my-list-ci:latest

jobs:
  # Security gate: Check if the actor is authorized
  # This prevents prompt injection attacks from untrusted external users
  authorize:
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check-auth.outputs.authorized }}
    steps:
      - name: Check authorization
        id: check-auth
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the author association based on event type
          EVENT_NAME="${{ github.event_name }}"

          case "$EVENT_NAME" in
            issue_comment)
              AUTHOR_ASSOC="${{ github.event.comment.author_association }}"
              ACTOR="${{ github.event.comment.user.login }}"
              ;;
            issues)
              if [ "${{ github.event.action }}" = "unlabeled" ]; then
                # For label removal the sender is the actor, not the issue author.
                # Only collaborators can remove labels, but verify via API to stay consistent.
                ACTOR="${{ github.actor }}"
                PERM=$(gh api "repos/${{ github.repository }}/collaborators/${ACTOR}/permission" --jq '.permission' 2>/dev/null || echo "none")
                case "$PERM" in
                  admin|maintain|write|triage)
                    AUTHOR_ASSOC="COLLABORATOR"
                    ;;
                  *)
                    AUTHOR_ASSOC="NONE"
                    ;;
                esac
              else
                AUTHOR_ASSOC="${{ github.event.issue.author_association }}"
                ACTOR="${{ github.event.issue.user.login }}"
              fi
              ;;
            *)
              echo "Unknown event type: $EVENT_NAME"
              echo "authorized=false" >> $GITHUB_OUTPUT
              exit 0
              ;;
          esac

          echo "Event: $EVENT_NAME"
          echo "Actor: $ACTOR"
          echo "Author association: $AUTHOR_ASSOC"

          # Allow: OWNER, MEMBER, COLLABORATOR
          # Deny: CONTRIBUTOR, FIRST_TIMER, FIRST_TIME_CONTRIBUTOR, MANNEQUIN, NONE
          case "$AUTHOR_ASSOC" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Authorized: $ACTOR is a $AUTHOR_ASSOC"
              echo "authorized=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Not authorized: $ACTOR is a $AUTHOR_ASSOC"
              echo "External users cannot trigger agent workflows."
              echo "This is a security measure to prevent prompt injection attacks."
              echo "authorized=false" >> $GITHUB_OUTPUT
              ;;
          esac

  detect_autoresolve:
    runs-on: ubuntu-latest
    outputs:
      autoresolve_requested: ${{ steps.detect.outputs.autoresolve_requested }}
      issue_title_b64: ${{ steps.detect.outputs.issue_title_b64 }}
      agent: ${{ steps.detect.outputs.agent }}
    steps:
      - name: Detect /autoresolve command and select agent
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
          DEFAULT_AGENT: codex
        run: |
          set -eu

          # Detect /autoresolve command (issue comments only)
          autoresolve_invocation() {
            printf '%s\n' "$1" | grep -Eq '^[[:space:]]*/autoresolve([[:space:]]|$)'
          }

          # Optional `/autoresolve <agent>` form picks the author per invocation.
          extract_agent_from_comment() {
            printf '%s\n' "$1" \
              | grep -Eim1 '^[[:space:]]*/autoresolve[[:space:]]+(codex|claude)([[:space:]]|$)' \
              | sed -E 's|.*/autoresolve[[:space:]]+(codex|claude).*|\1|i' \
              | tr '[:upper:]' '[:lower:]' \
              || true
          }

          # `agent:codex` or `agent:claude` label on the issue is a persistent
          # per-issue override.
          extract_agent_from_labels() {
            printf '%s' "$1" \
              | jq -r '(. // []) | .[]? // empty' 2>/dev/null \
              | grep -Eim1 '^agent:(codex|claude)$' \
              | sed -E 's/^agent:(codex|claude)$/\1/i' \
              | tr '[:upper:]' '[:lower:]' \
              || true
          }

          if [ "$EVENT_NAME" = "issue_comment" ] && autoresolve_invocation "${COMMENT_BODY:-}"; then
            echo "autoresolve_requested=true" >> "$GITHUB_OUTPUT"
          else
            echo "autoresolve_requested=false" >> "$GITHUB_OUTPUT"
          fi

          # Agent priority: comment override > issue label > repo default.
          AGENT=""
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            AGENT="$(extract_agent_from_comment "${COMMENT_BODY:-}")"
          fi
          if [ -z "$AGENT" ]; then
            AGENT="$(extract_agent_from_labels "${ISSUE_LABELS_JSON:-[]}")"
          fi
          if [ -z "$AGENT" ]; then
            AGENT="$DEFAULT_AGENT"
          fi
          case "$AGENT" in
            codex|claude) ;;
            *) AGENT="$DEFAULT_AGENT" ;;
          esac
          echo "agent=${AGENT}" >> "$GITHUB_OUTPUT"

          printf 'issue_title_b64=%s\n' "$(printf '%s' "${ISSUE_TITLE:-}" | base64 -w0)" >> "$GITHUB_OUTPUT"

  # Auto-resolve trusted issues by opening a PR.
  # Entry points:
  # - issue lifecycle events: opened, reopened, or unlabeled after codex-started
  # - /autoresolve issue comments on open non-PR issues from trusted original authors
  resolve-issue:
    needs: [authorize, detect_autoresolve]
    if: |
      needs.authorize.outputs.authorized == 'true' && (
        (github.event_name == 'issues' && (
          github.event.action == 'opened' ||
          github.event.action == 'reopened' ||
          (github.event.action == 'unlabeled' && (
            github.event.label.name == 'codex-started' ||
            github.event.label.name == 'claude-started'
          ))
        )) ||
        (github.event_name == 'issue_comment' &&
         !github.event.issue.pull_request &&
         github.event.issue.state == 'open' &&
         contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association) &&
         needs.detect_autoresolve.outputs.autoresolve_requested == 'true')
      )
    runs-on: [self-hosted, homelab]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}  # PAT required to push workflow file changes

      - name: Check for existing PR
        id: check-existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          # Search for open PRs whose body contains "Resolves #N", "Fixes #N", or "Closes #N"
          EXISTING=$(gh pr list --state open --search "Resolves #${ISSUE_NUM} OR Fixes #${ISSUE_NUM} OR Closes #${ISSUE_NUM}" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already targets issue #${ISSUE_NUM}, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "No existing PR found for issue #${ISSUE_NUM}"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Label issue as <agent>-started
        if: steps.check-existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          AGENT: ${{ needs.detect_autoresolve.outputs.agent }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LABEL="${AGENT}-started"
          gh label create "${LABEL}" --color "7057ff" --description "${AGENT} is working on this issue" --repo "${REPO}" 2>/dev/null || true
          gh issue edit "${ISSUE_NUM}" --add-label "${LABEL}" --repo "${REPO}"
          # Backwards compat: keep adding `codex-started` regardless of agent
          # so prior automation that watches that specific label still fires.
          if [ "${AGENT}" != "codex" ]; then
            gh label create "codex-started" --color "7057ff" --description "Codex is working on this issue" --repo "${REPO}" 2>/dev/null || true
            gh issue edit "${ISSUE_NUM}" --add-label "codex-started" --repo "${REPO}"
          fi

      - name: Log in to GHCR
        if: steps.check-existing.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure CI image
        if: steps.check-existing.outputs.skip != 'true'
        run: scripts/ensure-ci-image.sh "${CI_IMAGE}"

      - name: Prepare author session host dir
        if: steps.check-existing.outputs.skip != 'true'
        id: session
        env:
          AGENT: ${{ needs.detect_autoresolve.outputs.agent }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          DIR="$(./scripts/ci-session-store.sh prepare "${AGENT}" "${ISSUE_NUMBER}" "${RUN_ID}")"
          HOME_PATH="$(./scripts/ci-session-store.sh home-path "${AGENT}")"
          {
            echo "host_dir=${DIR}"
            echo "container_home=${HOME_PATH}"
          } >> "$GITHUB_OUTPUT"

      # Note: GH_TOKEN uses WORKFLOW_PAT because PRs created with GITHUB_TOKEN don't trigger workflows.
      # The host session dir is bind-mounted into the agent's home so the session
      # persists after the container exits and the fixer can resume it.
      - name: Resolve issue with Codex
        if: steps.check-existing.outputs.skip != 'true' && needs.detect_autoresolve.outputs.agent == 'codex'
        env:
          OPENAI_API_KEY: ${{ vars.AI_API_KEY }}
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE_B64: ${{ needs.detect_autoresolve.outputs.issue_title_b64 }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SESSION_HOST_DIR: ${{ steps.session.outputs.host_dir }}
          SESSION_CONTAINER_HOME: ${{ steps.session.outputs.container_home }}
        run: |
          set -euo pipefail

          STAGING_ROOT="${RUNNER_TEMP:-/tmp}/ci-agent"
          mkdir -p "$STAGING_ROOT"
          OUTPUT_STAGING=$(mktemp -d "${STAGING_ROOT}/resolve.XXXXXX")
          chmod 777 "$OUTPUT_STAGING"

          docker run --rm \
            --network host \
            --workdir /workspace \
            -v "${{ github.workspace }}:/workspace" \
            -v "$OUTPUT_STAGING:/output" \
            -v "$SESSION_HOST_DIR:$SESSION_CONTAINER_HOME" \
            -e OPENAI_API_KEY \
            -e GH_TOKEN \
            -e ISSUE_NUMBER \
            -e ISSUE_TITLE_B64 \
            -e REPO \
            -e RUN_ID \
            "${CI_IMAGE}" \
            -lc '
              set -euo pipefail
              source .devcontainer/configure-codex.sh

              ISSUE_TITLE=$(printf "%s" "$ISSUE_TITLE_B64" | base64 -d 2>/dev/null || echo "")
              export ISSUE_TITLE

              PROMPT=$(envsubst < .github/ci/prompts/codex-resolve-issue.md)

              timeout 60m codex exec \
                --json \
                --dangerously-bypass-approvals-and-sandbox \
                "$PROMPT" \
                < /dev/null 2>&1 \
                | tee /output/resolve-issue-conversation.jsonl
            '

          # Copy output back to runner.temp for upload-artifact. Using
          # runner.temp (owned by the runner user, cleaned between runs)
          # avoids host UID mismatch + accumulation issues on
          # self-hosted runners. Mirrors the fix in
          # NickBorgers/home-automation#1029.
          mkdir -p "${RUNNER_TEMP}"
          cp "$OUTPUT_STAGING/resolve-issue-conversation.jsonl" "${RUNNER_TEMP}/resolve-issue-conversation.jsonl" 2>/dev/null || true
          rm -rf "$OUTPUT_STAGING"

      - name: Resolve issue with Claude Code
        if: steps.check-existing.outputs.skip != 'true' && needs.detect_autoresolve.outputs.agent == 'claude'
        env:
          ANTHROPIC_API_KEY: fake-key
          ANTHROPIC_BASE_URL: https://llm.featherback-mermaid.ts.net/anthropic/
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE_B64: ${{ needs.detect_autoresolve.outputs.issue_title_b64 }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SESSION_HOST_DIR: ${{ steps.session.outputs.host_dir }}
          SESSION_CONTAINER_HOME: ${{ steps.session.outputs.container_home }}
        run: |
          set -euo pipefail

          STAGING_ROOT="${RUNNER_TEMP:-/tmp}/ci-agent"
          mkdir -p "$STAGING_ROOT"
          OUTPUT_STAGING=$(mktemp -d "${STAGING_ROOT}/resolve.XXXXXX")
          chmod 777 "$OUTPUT_STAGING"

          docker run --rm \
            --network host \
            --workdir /workspace \
            -v "${{ github.workspace }}:/workspace" \
            -v "$OUTPUT_STAGING:/output" \
            -v "$SESSION_HOST_DIR:$SESSION_CONTAINER_HOME" \
            -e ANTHROPIC_API_KEY \
            -e ANTHROPIC_BASE_URL \
            -e GH_TOKEN \
            -e ISSUE_NUMBER \
            -e ISSUE_TITLE_B64 \
            -e REPO \
            -e RUN_ID \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/workspace \
            "${CI_IMAGE}" \
            -lc '
              set -euo pipefail

              ISSUE_TITLE=$(printf "%s" "$ISSUE_TITLE_B64" | base64 -d 2>/dev/null || echo "")
              export ISSUE_TITLE

              PROMPT=$(envsubst < .github/ci/prompts/claude-resolve-issue.md)

              timeout 60m claude -p \
                --dangerously-skip-permissions \
                --permission-mode=bypassPermissions \
                --model claude-sonnet-4-6 \
                --verbose \
                --output-format=stream-json \
                "$PROMPT" \
                < /dev/null 2>&1 \
                | tee /output/resolve-issue-conversation.jsonl
            '

          mkdir -p "${RUNNER_TEMP}"
          cp "$OUTPUT_STAGING/resolve-issue-conversation.jsonl" "${RUNNER_TEMP}/resolve-issue-conversation.jsonl" 2>/dev/null || true
          rm -rf "$OUTPUT_STAGING"

      - name: Validate author session persisted
        if: steps.check-existing.outputs.skip != 'true'
        id: validate-session
        env:
          AGENT: ${{ needs.detect_autoresolve.outputs.agent }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        continue-on-error: true
        run: |
          set -euo pipefail
          if ./scripts/ci-session-store.sh validate "${AGENT}" "${ISSUE_NUMBER}" "${RUN_ID}"; then
            echo "Author session persisted at $(./scripts/ci-session-store.sh host-dir "${AGENT}" "${ISSUE_NUMBER}" "${RUN_ID}")"
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Author session not persisted; review-pipeline fixer will fall back to fresh Claude."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      # Pack + upload the session as a workflow artifact so the v2 review-fixer
      # can download it on a different (ephemeral) runner. Keyed by
      # ${AGENT}-${{ github.run_id }} so the fixer can reconstruct the artifact
      # name from the `Author-Session: <agent>/<run-id>` PR-body trailer.
      - name: Pack author session for fixer transit
        if: steps.check-existing.outputs.skip != 'true' && steps.validate-session.outputs.ok == 'true'
        id: pack-session
        env:
          AGENT: ${{ needs.detect_autoresolve.outputs.agent }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          TAR="${RUNNER_TEMP}/author-session.tgz"
          ./scripts/ci-session-store.sh pack "${AGENT}" "${ISSUE_NUMBER}" "${RUN_ID}" "${TAR}"
          echo "tar=${TAR}" >> "$GITHUB_OUTPUT"

      - name: Upload author session artifact
        if: steps.check-existing.outputs.skip != 'true' && steps.validate-session.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: author-session-${{ needs.detect_autoresolve.outputs.agent }}-${{ github.run_id }}
          path: ${{ steps.pack-session.outputs.tar }}
          retention-days: 7
          if-no-files-found: error

      - name: Upload issue resolution conversation log
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: resolve-issue-conversation-log
          path: ${{ runner.temp }}/resolve-issue-conversation.jsonl
          retention-days: 7
