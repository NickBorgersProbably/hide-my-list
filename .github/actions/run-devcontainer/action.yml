---
name: Run command in devcontainer
description: >
  Runs a command inside a pre-built devcontainer image using the
  devcontainer CLI directly, avoiding the devcontainers/ci post-step
  cleanup crash while preserving the repository's devcontainer
  lifecycle hooks.

inputs:
  image:
    description: Devcontainer image to run (e.g. ghcr.io/org/repo-devcontainer)
    required: true
  workspace_folder:
    description: Repo checkout path to mount into the devcontainer
    required: false
    default: '.'
  run_cmd:
    description: Shell commands to execute inside the container
    required: true
  env:
    description: >
      Newline-separated KEY=VALUE pairs forwarded as container
      environment variables. Blank lines and lines starting with #
      are ignored.
    required: false
    default: ''
  workdir:
    description: Repo-relative working directory for the command
    required: false
    default: '.'
  pull:
    description: Pull the image before running (set to 'false' to skip)
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Prepare script
      id: prepare-script
      shell: bash
      run: |
        WORKSPACE="${{ github.workspace }}"
        if [ "${{ inputs.workspace_folder }}" != "." ]; then
          WORKSPACE="$WORKSPACE/${{ inputs.workspace_folder }}"
        fi

        SCRIPT=$(mktemp "$WORKSPACE/.git/devcontainer-run-XXXXXX.sh")
        cat > "$SCRIPT" <<'RUNCMD'
        set -euo pipefail
        cd '${{ inputs.workdir }}'
        ${{ inputs.run_cmd }}
        RUNCMD
        chmod +x "$SCRIPT"
        echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"

    - name: Run in devcontainer
      shell: bash
      run: |
        set -euo pipefail

        WORKSPACE="${{ github.workspace }}"
        if [ "${{ inputs.workspace_folder }}" != "." ]; then
          WORKSPACE="$WORKSPACE/${{ inputs.workspace_folder }}"
        fi
        SCRIPT_PATH="${{ steps.prepare-script.outputs.script }}"
        GENERATED_CONFIG=$(
          mktemp "$WORKSPACE/.devcontainer/devcontainer-codex-ci-XXXXXX.json"
        )
        cleanup() {
          rm -f "$GENERATED_CONFIG" "$SCRIPT_PATH"
        }
        trap cleanup EXIT

        # Optionally pull the image
        if [ "${{ inputs.pull }}" != "false" ]; then
          docker pull "${{ inputs.image }}"
        fi

        python3 \
          - \
          "$WORKSPACE/.devcontainer/devcontainer.json" \
          "$GENERATED_CONFIG" \
          "${{ inputs.image }}" \
          "${SSH_AUTH_SOCK:-}" <<'PY'
        import json
        import sys

        source_path, target_path, image, ssh_auth_sock = sys.argv[1:5]
        with open(source_path, "r", encoding="utf-8") as handle:
            config = json.load(handle)

        def is_ssh_agent_mount(mount):
            if isinstance(mount, str):
                return (
                    "${localEnv:SSH_AUTH_SOCK}" in mount
                    or "target=/run/ssh-agent.sock" in mount.replace(" ", "")
                )
            if isinstance(mount, dict):
                source = str(mount.get("source", ""))
                target = str(mount.get("target", ""))
                return (
                    "${localEnv:SSH_AUTH_SOCK}" in source
                    or target == "/run/ssh-agent.sock"
                )
            return False

        config.pop("build", None)
        config.pop("initializeCommand", None)
        config["image"] = image

        if not ssh_auth_sock:
            mounts = config.get("mounts")
            if isinstance(mounts, list):
                config["mounts"] = [
                    mount for mount in mounts if not is_ssh_agent_mount(mount)
                ]

            remote_env = config.get("remoteEnv")
            if isinstance(remote_env, dict):
                remote_env.pop("SSH_AUTH_SOCK", None)
                if not remote_env:
                    config.pop("remoteEnv", None)

        with open(target_path, "w", encoding="utf-8") as handle:
            json.dump(config, handle, indent=2)
            handle.write("\n")
        PY

        # Forward remote env vars to lifecycle hooks and the target command.
        REMOTE_ENV_ARGS=()
        while IFS= read -r line; do
          [[ -z "$line" || "$line" == \#* ]] && continue
          REMOTE_ENV_ARGS+=( --remote-env "$line" )
        done <<'ENVEOF'
        ${{ inputs.env }}
        ENVEOF

        npx -y @devcontainers/cli up \
          --workspace-folder "$WORKSPACE" \
          --config "$GENERATED_CONFIG" \
          --remove-existing-container \
          --skip-post-attach \
          "${REMOTE_ENV_ARGS[@]}"

        SCRIPT_NAME=$(basename "$SCRIPT_PATH")

        npx -y @devcontainers/cli exec \
          --workspace-folder "$WORKSPACE" \
          --config "$GENERATED_CONFIG" \
          "${REMOTE_ENV_ARGS[@]}" \
          bash -lc "bash '.git/$SCRIPT_NAME'"
