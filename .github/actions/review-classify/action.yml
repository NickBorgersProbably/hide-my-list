---
name: Review pipeline file classifier
description: >
  Single source of truth for "which reviewer roles apply to this SHA"
  in the v2 review pipeline. Classifies the diff against the provided
  PR base ref / SHA
  and emits a JSON list of applicable roles.

  Today the rules are:
    - design:    always
    - docs:      always
    - security:  unless docs_only (all changed files are inert docs),
                 OR always for review-orchestration / routing files,
                 OR always for python_runtime files (app/**/*.py, migrations/*.sql,
                 tests/**/*.py) — security review owns SQL injection, secrets,
                 and constrained-tool-surface invariants for Python code
    - psych:     unless config_only (pure CI/infrastructure config);
                 also triggered by python_prompt_template files (app/prompts/*.md.j2)
                 for banned-phrase and shame-safety contract evaluation
    - prompt:    unless config_only (pure CI/infrastructure config);
                 also triggered by python_prompt_template files (app/prompts/*.md.j2)
                 for prompt-parity contract evaluation
    - test:      fires for any file in the test-rig surface (see
                 is_test_rig_surface() below): app/**, migrations/**,
                 setup/model-tiers.json, app/prompts/**, docs/ai-prompts/**,
                 tests/** (including dropped/weakened tests),
                 the test reviewer prompt itself, docs/python-rewrite/test-rig.md,
                 and the review schema JSONs. Enforces test-rig maintenance.

  These mirror the conditions enforced by the current review pipeline's
  reviewer routing. Centralizing them here means adding a new role is
  one matrix entry + one new prompt file, with no scattered
  if-conditions to update.

  See agentic-pipeline-learnings.md §1.9 and §1.12: spec-critical
  and reviewer-prompt .md files must NOT be classified as inert docs
  or config just because they end in .md. The classifier carves out
  AGENTS.md, design/adhd-priorities.md,
  docs/ai-prompts/{shared,intake,selection,rejection,cannot-finish,check-in,breakdown}.md,
  docs/task-lifecycle.md, docs/notion-schema.md, docs/architecture.md,
  docs/user-interactions.md, docs/user-preferences.md, docs/reward-system.md,
  and .github/scripts/review/prompts/*.md.

  Python source file classes (added in Phase C):
    - python_runtime:        app/**/*.py, migrations/*.sql, tests/**/*.py
    - python_prompt_template: app/prompts/*.md.j2

inputs:
  base_ref:
    description: Base ref to diff against
    required: false
    default: origin/main
  head_sha:
    description: Head SHA being reviewed
    required: true

outputs:
  roles_json:
    description: JSON array of applicable role names
    value: ${{ steps.classify.outputs.roles_json }}
  docs_only:
    description: '"true" if the diff only touches inert documentation'
    value: ${{ steps.classify.outputs.docs_only }}
  config_only:
    description: '"true" if the diff only touches CI/infrastructure config'
    value: ${{ steps.classify.outputs.config_only }}
  python_runtime:
    description: '"true" if diff includes app/**/*.py, migrations/*.sql, or tests/**/*.py'
    value: ${{ steps.classify.outputs.python_runtime }}
  python_prompt_template:
    description: '"true" if diff includes app/prompts/*.md.j2'
    value: ${{ steps.classify.outputs.python_prompt_template }}
  test_rig_surface:
    description: '"true" if diff touches test-rig coverage surface (app/**, migrations/**, setup/model-tiers.json, app/prompts/**, docs/ai-prompts/**, or test.md)'
    value: ${{ steps.classify.outputs.test_rig_surface }}

runs:
  using: composite
  steps:
    - name: Classify changed files
      id: classify
      shell: bash
      env:
        BASE_REF: ${{ inputs.base_ref }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        set -euo pipefail

        FILES=""
        DIFF_FAILED=false
        if ! FILES=$(git diff --name-only "${BASE_REF}"..."${HEAD_SHA}" 2>/dev/null); then
          DIFF_FAILED=true
          echo "review-classify: failed to diff ${BASE_REF}...${HEAD_SHA}; failing closed"
        fi

        if [ "$DIFF_FAILED" = "false" ] && [ -z "$FILES" ]; then
          # No diff (e.g. empty PR). Classify as docs_only so only the
          # cheap reviewers run; the judge will produce a vacuous result
          # and the orchestrator will fail closed.
          echo "review-classify: empty diff for $HEAD_SHA"
        fi

        DOCS_ONLY=true
        CONFIG_ONLY=true
        FORCE_SECURITY=false

        if [ "$DIFF_FAILED" = "true" ]; then
          DOCS_ONLY=false
          CONFIG_ONLY=false
          FORCE_SECURITY=true
        fi

        # Files that, despite being .md, are runtime spec (rule §1.9).
        is_spec_md() {
          case "$1" in
            AGENTS.md) return 0 ;;
            design/adhd-priorities.md) return 0 ;;
            docs/ai-prompts/intake.md|docs/ai-prompts/selection.md|docs/ai-prompts/rejection.md|docs/ai-prompts/cannot-finish.md|docs/ai-prompts/check-in.md|docs/ai-prompts/breakdown.md|docs/ai-prompts/shared.md|docs/task-lifecycle.md|docs/notion-schema.md|docs/architecture.md|docs/user-interactions.md|docs/user-preferences.md|docs/reward-system.md) return 0 ;;
            *) return 1 ;;
          esac
        }

        # Reviewer prompts are executable routing/spec surface even
        # though they live under .github/ and end in .md.
        is_review_prompt_md() {
          case "$1" in
            .github/scripts/review/prompts/*.md) return 0 ;;
            *) return 1 ;;
          esac
        }

        # Review-orchestration files are CI control-plane surface.
        # Security/infra review owns routing and gating regressions for
        # these files even when the PR is otherwise workflow/config-only.
        is_security_routing_file() {
          case "$1" in
            .github/workflows/review-*.yml) return 0 ;;
            .github/actions/review-classify/*) return 0 ;;
            .github/scripts/review/prompts/*.md) return 0 ;;
            .github/scripts/review/*.mjs) return 0 ;;
            *) return 1 ;;
          esac
        }

        # Python runtime source files: app/**/*.py, migrations/*.sql, tests/**/*.py.
        # Security reviewer evaluates SQL injection, secrets, constrained-tool-surface.
        # Design reviewer evaluates module design, async correctness, LangGraph patterns.
        is_python_runtime() {
          case "$1" in
            app/*.py|app/**/*.py) return 0 ;;
            migrations/*.sql) return 0 ;;
            tests/*.py|tests/**/*.py) return 0 ;;
            *) return 1 ;;
          esac
        }

        # Python prompt template files: app/prompts/*.md.j2.
        # Psych reviewer evaluates banned-phrase + shame-safety contract.
        # Prompt reviewer evaluates prompt-parity contract (headings present in source).
        is_python_prompt_template() {
          case "$1" in
            app/prompts/*.md.j2) return 0 ;;
            *) return 1 ;;
          esac
        }

        # Test-rig coverage surface: files where missing tests are a blocker.
        # Fires the test reviewer role.
        # Includes tests/** so PRs that delete or weaken tests are also routed
        # to the reviewer (clause 6 of test.md: dropped tests need justification).
        is_test_rig_surface() {
          case "$1" in
            app/*.py|app/**/*.py) return 0 ;;
            migrations/*.sql) return 0 ;;
            setup/model-tiers.json) return 0 ;;
            app/prompts/*.md.j2) return 0 ;;
            docs/ai-prompts/*.md) return 0 ;;
            tests/*.py|tests/**/*.py) return 0 ;;
            tests/regressions/*|tests/regressions/**) return 0 ;;
            .github/scripts/review/prompts/test.md) return 0 ;;
            docs/python-rewrite/test-rig.md) return 0 ;;
            .github/scripts/review/schema/*.json) return 0 ;;
            docker/compose.yaml) return 0 ;;
            *) return 1 ;;
          esac
        }

        HAS_PYTHON_RUNTIME=false
        HAS_PYTHON_PROMPT_TEMPLATE=false
        HAS_TEST_RIG_SURFACE=false

        while IFS= read -r f; do
          [ -z "$f" ] && continue

          if is_security_routing_file "$f"; then
            FORCE_SECURITY=true
          fi

          # Python runtime files force security review (SQL injection, secrets, tool surface).
          if is_python_runtime "$f"; then
            HAS_PYTHON_RUNTIME=true
            FORCE_SECURITY=true
          fi

          # Python prompt templates force psych + prompt review.
          if is_python_prompt_template "$f"; then
            HAS_PYTHON_PROMPT_TEMPLATE=true
          fi

          # Test-rig surface files force test coverage review.
          if is_test_rig_surface "$f"; then
            HAS_TEST_RIG_SURFACE=true
          fi

          # Anything outside config/CI invalidates config_only.
          case "$f" in
            .github/scripts/review/prompts/*.md) CONFIG_ONLY=false ;;
            .github/*|.devcontainer/*|scripts/*) ;;
            *) CONFIG_ONLY=false ;;
          esac

          # Spec MDs and any non-doc/design file invalidate docs_only.
          if is_spec_md "$f" || is_review_prompt_md "$f"; then
            DOCS_ONLY=false
          elif is_python_runtime "$f" || is_python_prompt_template "$f"; then
            # Python source files are not inert docs.
            DOCS_ONLY=false
          else
            case "$f" in
              docs/*.md|design/*.md|README.md|*.md) ;;
              *) DOCS_ONLY=false ;;
            esac
          fi
        done <<< "$FILES"

        ROLES='["design","docs"]'
        if [ "$DOCS_ONLY" != "true" ] || [ "$FORCE_SECURITY" = "true" ]; then
          ROLES=$(echo "$ROLES" | jq -c '. + ["security"]')
        fi
        if [ "$CONFIG_ONLY" != "true" ] || [ "$HAS_PYTHON_PROMPT_TEMPLATE" = "true" ]; then
          ROLES=$(echo "$ROLES" | jq -c '. + ["psych","prompt"]')
        fi
        if [ "$HAS_TEST_RIG_SURFACE" = "true" ]; then
          ROLES=$(echo "$ROLES" | jq -c '. + ["test"]')
        fi

        {
          echo "roles_json=$ROLES"
          echo "docs_only=$DOCS_ONLY"
          echo "config_only=$CONFIG_ONLY"
          echo "python_runtime=$HAS_PYTHON_RUNTIME"
          echo "python_prompt_template=$HAS_PYTHON_PROMPT_TEMPLATE"
          echo "test_rig_surface=$HAS_TEST_RIG_SURFACE"
        } >> "$GITHUB_OUTPUT"

        echo "review-classify: roles=$ROLES docs_only=$DOCS_ONLY config_only=$CONFIG_ONLY python_runtime=$HAS_PYTHON_RUNTIME python_prompt_template=$HAS_PYTHON_PROMPT_TEMPLATE test_rig_surface=$HAS_TEST_RIG_SURFACE"
