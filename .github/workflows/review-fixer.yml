---
name: Review pipeline v2 — fixer
# Reusable: invoked from review-pipeline.yml after all reviewers complete.
# Reads every reviewer artifact, runs the agentic fixer with a NARROW
# prompt that only addresses substantive findings the reviewers asked
# for, then, if it produces a commit, pushes that SHA and claims it on
# review/pipeline immediately afterward. The GO short-circuit on
# `All Required Agent Reviews` is what prevents redundant follow-up
# cycles on already-finalized SHAs.
#
# This is the ONLY job in the v2 pipeline that has write permission to
# the PR branch. All reviewers and the judge are read-only.

on:
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: true
      reviewed_sha:
        type: string
        required: true
      head_ref:
        type: string
        required: true
      head_repo:
        type: string
        required: true
      cycle:
        type: string
        required: true
      devcontainer_image:
        type: string
        required: true
    outputs:
      new_sha:
        description: 'SHA after fixer push (== reviewed_sha if no-op)'
        value: ${{ jobs.fix.outputs.new_sha }}
      fix_artifact_name:
        description: 'Artifact name containing fix-result.json'
        value: ${{ jobs.fix.outputs.fix_artifact_name }}
    secrets:
      WORKFLOW_PAT:
        required: true

permissions:
  # Read-only GITHUB_TOKEN. The fixer's `git push` uses the
  # WORKFLOW_PAT-authenticated remote (set up via the PR-branch
  # actions/checkout step that passes token: secrets.WORKFLOW_PAT),
  # not GITHUB_TOKEN. Same for the `gh api .../statuses` claim and
  # any `gh pr` calls. Actions/checkout for the orchestration
  # workspace only needs read.
  contents: read
  packages: read
  pull-requests: read
  statuses: read

env:
  PR_WORKSPACE_PATH: pr-head

jobs:
  fix:
    name: Apply reviewer-requested fixes
    runs-on: self-hosted
    outputs:
      new_sha: ${{ steps.push.outputs.new_sha }}
      fix_artifact_name: fix-result-${{ inputs.reviewed_sha }}
    steps:
      - name: Checkout main (for composite actions)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.reviewed_sha }}
          repository: ${{ inputs.head_repo }}
          path: ${{ env.PR_WORKSPACE_PATH }}
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Download all reviewer artifacts into workspace
        # Must be inside the workspace folder so the devcontainer can
        # see them — host /tmp is NOT bind-mounted into the container.
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.PR_WORKSPACE_PATH }}/.review-output/reviewer-artifacts
          pattern: reviewer-*-${{ inputs.reviewed_sha }}

      - name: Clean stale fixer artifacts from prior runs
        # Prior pipeline runs may have left fixer-result.json and
        # fixer-output.jsonl owned by the runner UID (1001). The Codex
        # fixer runs as UID 1000 inside the container and can't
        # overwrite them. Remove stale files so the fixer starts clean.
        run: |
          rm -f "${PR_WORKSPACE_PATH}/.review-output/fixer-result.json" \
                "${PR_WORKSPACE_PATH}/.review-output/fixer-output.jsonl" \
                "${PR_WORKSPACE_PATH}/.review-output/write-test"

      - name: Create directories for devcontainer mounts
        run: mkdir -p ~/.config/gh ~/.claude ~/.codex

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect author session for resume
        # Three-way fixer dispatch: if the PR body carries an
        # `Author-Session: <agent>/<run-id>` trailer (written by
        # resolve-issue) AND that session dir still exists on the
        # host, resume the original author. Otherwise the fixer is a
        # fresh Claude session, same as before this redesign.
        id: detect-session
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          PR_BODY=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.body // ""')

          TRAILER="$(./scripts/ci-session-store.sh parse-trailer "$PR_BODY" || true)"
          AGENT=""
          RUN_ID=""
          if [ -n "$TRAILER" ]; then
            AGENT="$(printf '%s' "$TRAILER" | cut -f1)"
            RUN_ID="$(printf '%s' "$TRAILER" | cut -f2)"
          fi

          ISSUE_NUM=""
          if [ -n "$AGENT" ] && [ -n "$RUN_ID" ]; then
            ISSUE_NUM=$(printf '%s\n' "$PR_BODY" \
              | grep -Eim1 '^(Resolves|Fixes|Closes) #[0-9]+' \
              | sed -E 's/^(Resolves|Fixes|Closes) #([0-9]+).*/\2/' \
              || true)
          fi

          MODE="fallback"
          SESSION_HOST_DIR=""
          if [ -n "$AGENT" ] && [ -n "$RUN_ID" ] && [ -n "$ISSUE_NUM" ]; then
            SESSION_HOST_DIR=$(./scripts/ci-session-store.sh host-dir "$AGENT" "$ISSUE_NUM" "$RUN_ID")
            if [ -d "$SESSION_HOST_DIR" ] && [ -n "$(ls -A "$SESSION_HOST_DIR" 2>/dev/null)" ]; then
              MODE="${AGENT}-resume"
            else
              echo "::warning::Author-Session trailer present (${AGENT}/${RUN_ID} for #${ISSUE_NUM}) but session dir missing or empty: ${SESSION_HOST_DIR}; falling back to fresh Claude"
              SESSION_HOST_DIR=""
            fi
          fi

          {
            echo "agent=${AGENT}"
            echo "run_id=${RUN_ID}"
            echo "issue_num=${ISSUE_NUM}"
            echo "session_host_dir=${SESSION_HOST_DIR}"
            echo "mode=${MODE}"
          } >> "$GITHUB_OUTPUT"

          echo "fixer dispatch: mode=${MODE} agent=${AGENT:-none} run_id=${RUN_ID:-none} issue=${ISSUE_NUM:-none}"

      - name: Run Codex fixer (resumed author)
        if: steps.detect-session.outputs.mode == 'codex-resume'
        uses: ./.github/actions/review-codex-resume
        with:
          agent: codex
          session_host_dir: ${{ steps.detect-session.outputs.session_host_dir }}
          role: fixer
          prompt_path: .github/scripts/review/prompts/fixer-resume.md
          image: ${{ inputs.devcontainer_image }}
          workspace_folder: ${{ env.PR_WORKSPACE_PATH }}
          pr_number: ${{ inputs.pr_number }}
          reviewed_sha: ${{ inputs.reviewed_sha }}
          cycle: ${{ inputs.cycle }}
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          extra_env: |
            REVIEWER_ARTIFACTS_DIR=.review-output/reviewer-artifacts

      - name: Run Claude fixer (resumed author)
        if: steps.detect-session.outputs.mode == 'claude-resume'
        uses: ./.github/actions/review-claude-resume
        with:
          agent: claude
          session_host_dir: ${{ steps.detect-session.outputs.session_host_dir }}
          role: fixer
          prompt_path: .github/scripts/review/prompts/fixer-resume.md
          image: ${{ inputs.devcontainer_image }}
          workspace_folder: ${{ env.PR_WORKSPACE_PATH }}
          pr_number: ${{ inputs.pr_number }}
          reviewed_sha: ${{ inputs.reviewed_sha }}
          cycle: ${{ inputs.cycle }}
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          extra_env: |
            REVIEWER_ARTIFACTS_DIR=.review-output/reviewer-artifacts

      - name: Run Claude fixer (fresh fallback)
        if: steps.detect-session.outputs.mode == 'fallback'
        uses: ./.github/actions/review-claude-run
        with:
          role: fixer
          prompt_path: .github/scripts/review/prompts/fixer.md
          image: ${{ inputs.devcontainer_image }}
          workspace_folder: ${{ env.PR_WORKSPACE_PATH }}
          pr_number: ${{ inputs.pr_number }}
          reviewed_sha: ${{ inputs.reviewed_sha }}
          cycle: ${{ inputs.cycle }}
          read_only: 'false'
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          extra_env: |
            REVIEWER_ARTIFACTS_DIR=.review-output/reviewer-artifacts

      - name: Resolve fixer artifact path
        # All three fixer paths above write to the same workspace
        # location. Pin the absolute host path here so downstream
        # validate / commit / push / upload steps don't have to
        # branch on which fixer ran.
        id: artifact-path
        run: |
          set -euo pipefail
          BASE="${GITHUB_WORKSPACE}/${{ env.PR_WORKSPACE_PATH }}/.review-output"
          {
            echo "result_json=${BASE}/fixer-result.json"
            echo "output_jsonl=${BASE}/fixer-output.jsonl"
          } >> "$GITHUB_OUTPUT"

      - name: Validate fix-result against schema
        env:
          ARTIFACT: ${{ steps.artifact-path.outputs.result_json }}
        run: |
          set -euo pipefail
          # Schema declares $schema: draft/2020-12. ajv-cli@5 needs an
          # explicit --spec=draft2020 flag to register the meta-schema;
          # without it the schema parse fails with "no schema with key
          # or ref https://json-schema.org/draft/2020-12/schema".
          npx -y ajv-cli@5 validate \
            --spec=draft2020 \
            -s .github/scripts/review/schema/fix-result-v1.json \
            -d "$ARTIFACT"

      # Commit the fixer's working-tree changes from the host runner
      # rather than from inside the CI container. The container runs
      # as UID 1000 (`ci` user) and the bind-mounted workspace's
      # `.git/` directory is owned by the runner UID (1001), so any
      # git-write operation from inside the container fails with
      # "cannot update the ref 'HEAD': unable to append to
      # '.git/logs/HEAD': Permission denied". Doing the commit on
      # the host means git ops run as the workspace owner, which
      # "just works". The fixer prompt has been updated to leave
      # the working tree unstaged and set new_sha to REVIEWED_SHA;
      # this step computes the real new_sha and patches it into the
      # artifact so the downstream push step reads a consistent SHA.

      - name: Commit fixer working-tree changes
        id: commit
        env:
          ARTIFACT: ${{ steps.artifact-path.outputs.result_json }}
          REVIEWED_SHA: ${{ inputs.reviewed_sha }}
        working-directory: ${{ env.PR_WORKSPACE_PATH }}
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "fixer produced no working-tree changes; no commit needed"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build the commit message from the fixer's addressed[] list.
          # Matches the wording the old in-container commit used.
          ADDRESSED=$(jq -r '.addressed | join(", ")' "$ARTIFACT")
          if [ -z "$ADDRESSED" ]; then
            echo "::error::fixer has working-tree changes but addressed[] is empty"
            git status --short
            exit 1
          fi

          git config user.name "hide-my-list-ci[bot]"
          git config user.email "ci@hide-my-list.local"
          git add -A
          git commit -m "review-pipeline-v2: apply fixes for ${ADDRESSED}" \
                     -m "Addresses blockers requested by the reviewers."

          NEW_SHA=$(git rev-parse HEAD)
          echo "committed=true" >> "$GITHUB_OUTPUT"
          echo "new_sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

          # Patch the fixer-result.json so the downstream Claim step
          # (and the judge) read the real post-commit SHA instead of
          # the placeholder the agent wrote. $ARTIFACT is an absolute
          # host path emitted by the review-codex-run action.
          TMP=$(mktemp)
          jq --arg new_sha "$NEW_SHA" '.new_sha = $new_sha' "$ARTIFACT" > "$TMP"
          mv "$TMP" "$ARTIFACT"

      - name: Push new SHA, then claim it
        id: push
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          ARTIFACT: ${{ steps.artifact-path.outputs.result_json }}
          REVIEWED_SHA: ${{ inputs.reviewed_sha }}
          HEAD_REF: ${{ inputs.head_ref }}
        run: |
          set -euo pipefail

          INPUT_SHA=$(jq -r '.input_sha' "$ARTIFACT")
          NEW_SHA=$(jq -r '.new_sha' "$ARTIFACT")

          if [ "$INPUT_SHA" != "$REVIEWED_SHA" ]; then
            echo "::error::fixer reported input_sha=$INPUT_SHA but reviewed_sha=$REVIEWED_SHA"
            exit 1
          fi

          if [ "$NEW_SHA" = "$REVIEWED_SHA" ]; then
            echo "fixer was a no-op; nothing to push"
            echo "new_sha=$REVIEWED_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push from the PR workspace, which has the PAT-authenticated remote.
          cd "${{ env.PR_WORKSPACE_PATH }}"
          REMOTE_HEAD=$(git ls-remote --heads origin "refs/heads/${HEAD_REF}" | awk 'NR==1 {print $1}')
          if [ -z "$REMOTE_HEAD" ] || [ "$REMOTE_HEAD" != "$REVIEWED_SHA" ]; then
            TMP_ARTIFACT=$(mktemp)
            jq \
              --arg reviewed_sha "$REVIEWED_SHA" \
              --arg remote_head "$REMOTE_HEAD" \
              --arg head_ref "$HEAD_REF" \
              '
              def push_skip_reason:
                if $remote_head == "" then
                  "Not pushed because origin/" + $head_ref + " no longer exists after gather froze " + $reviewed_sha + "."
                else
                  "Not pushed because origin/" + $head_ref + " advanced to " + $remote_head + " after gather froze " + $reviewed_sha + "."
                end;
              .new_sha = $reviewed_sha
              | .skipped = (
                  (.skipped // [])
                  + ((.addressed // []) | map({id: ., reason: push_skip_reason}))
                  | if length == 0 then
                      [{id: "docs/review-pipeline-head-moved", reason: push_skip_reason}]
                    else
                      .
                    end
                )
              | .addressed = []
              ' "$ARTIFACT" > "$TMP_ARTIFACT"
            mv "$TMP_ARTIFACT" "$ARTIFACT"

            if [ -z "$REMOTE_HEAD" ]; then
              echo "origin/${HEAD_REF} no longer exists; refusing to push fixer commit built from ${REVIEWED_SHA}"
            else
              echo "origin/${HEAD_REF} moved to ${REMOTE_HEAD}; refusing to push fixer commit built from ${REVIEWED_SHA}"
            fi

            echo "new_sha=$REVIEWED_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push first, claim immediately after.
          #
          # The original design tried to write a `pending` status on
          # NEW_SHA *before* pushing to close the synchronize-event
          # race window. But GitHub's commit-status API returns 422
          # for SHAs it hasn't seen yet, so the pre-push claim was
          # impossible — the SHA only exists on the remote after the
          # push completes.
          #
          # Push then claim. The synchronize event GitHub fires for
          # the push takes a few seconds to schedule. The race window
          # is bounded by the cycle counter (#374's cleanup-claim and
          # gather's cycle cap), so worst case is a single wasted
          # extra cycle, not an infinite loop.
          git push origin "HEAD:${HEAD_REF}"

          gh api -X POST "repos/${REPO}/statuses/${NEW_SHA}" \
            -f state=pending \
            -f context=review/pipeline \
            -f description="cycle=${{ inputs.cycle }} (fixer post-push claim)" >/dev/null

          echo "new_sha=$NEW_SHA" >> "$GITHUB_OUTPUT"

      - name: Write fix commit status
        uses: ./.github/actions/review-state
        with:
          op: write-status
          sha: ${{ inputs.reviewed_sha }}
          context: review/fix
          state: success
          description: 'cycle=${{ inputs.cycle }}'
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Upload fix-result artifact
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: fix-result-${{ inputs.reviewed_sha }}
          path: |
            ${{ env.PR_WORKSPACE_PATH }}/.review-output/fixer-result.json
            ${{ env.PR_WORKSPACE_PATH }}/.review-output/fixer-output.jsonl
