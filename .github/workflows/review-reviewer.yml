---
name: Review pipeline v2 — reviewer
# Reusable: invoked once per reviewer role from review-pipeline.yml's
# matrix. Runs Codex with a read-only tool allowlist, validates the
# resulting JSON artifact against schema/reviewer-v1.json, publishes a
# GitHub PR Review (display-only), and writes a per-role commit status
# on the reviewed SHA.

on:
  workflow_call:
    inputs:
      role:
        type: string
        required: true
      pr_number:
        type: string
        required: true
      reviewed_sha:
        type: string
        required: true
      base_sha:
        type: string
        required: true
      head_ref:
        type: string
        required: true
      head_repo:
        type: string
        required: true
      cycle:
        type: string
        required: true
      devcontainer_image:
        type: string
        required: true
      artifact_prefix:
        # Artifact-name prefix for the uploaded reviewer JSON. The judge
        # downloads artifacts matching `reviewer-*-<sha>` — set this to
        # `lens` (or any non-`reviewer` value) when running a sub-lens
        # whose output is consumed by a merger rather than fed directly
        # to the judge. The security orchestrator uses this to dispatch
        # `security-breadth` and `security-narrow` as `lens-*` artifacts
        # without polluting the judge's input set.
        type: string
        required: false
        default: reviewer
      publish:
        # When 'false', skip the human-facing PR Review publish step.
        # Sub-lens roles set this to keep the PR comment thread quiet;
        # the merger publishes the single merged review.
        type: string
        required: false
        default: 'true'
      write_status:
        # When 'false', skip the per-role commit status write. Sub-lens
        # roles skip individual statuses; the orchestrator-owning role
        # (e.g. `security` after merge) carries the canonical status.
        type: string
        required: false
        default: 'true'
    secrets:
      WORKFLOW_PAT:
        required: true

permissions:
  # Read-only GITHUB_TOKEN. Posting GitHub PR Reviews via
  # review-publish authenticates with secrets.WORKFLOW_PAT, not
  # GITHUB_TOKEN (rule 2.3). The reviewer-setup composite action
  # uses GITHUB_TOKEN for actions/checkout only.
  contents: read
  packages: read
  pull-requests: read
  statuses: read

env:
  PR_WORKSPACE_PATH: pr-head

jobs:
  review:
    name: ${{ inputs.role }} review
    runs-on: self-hosted
    steps:
      - name: Checkout main (for composite actions)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.reviewed_sha }}
          repository: ${{ inputs.head_repo }}
          path: ${{ env.PR_WORKSPACE_PATH }}
          fetch-depth: 0

      - name: Create directories for devcontainer mounts
        run: mkdir -p ~/.config/gh ~/.claude ~/.codex

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run reviewer in devcontainer
        id: run
        uses: ./.github/actions/review-codex-run
        with:
          role: ${{ inputs.role }}
          prompt_path: .github/scripts/review/prompts/${{ inputs.role }}.md
          image: ${{ inputs.devcontainer_image }}
          workspace_folder: ${{ env.PR_WORKSPACE_PATH }}
          pr_number: ${{ inputs.pr_number }}
          reviewed_sha: ${{ inputs.reviewed_sha }}
          cycle: ${{ inputs.cycle }}
          read_only: 'true'
          workflow_pat: ${{ secrets.WORKFLOW_PAT }}
          extra_env: |
            REVIEW_BASE_SHA=${{ inputs.base_sha }}

      - name: Validate reviewer artifact against schema
        env:
          ARTIFACT: ${{ steps.run.outputs.result_json }}
        run: |
          set -euo pipefail
          # Schema declares $schema: draft/2020-12. ajv-cli@5 needs an
          # explicit --spec=draft2020 flag to register the meta-schema;
          # without it the schema parse fails with "no schema with key
          # or ref https://json-schema.org/draft/2020-12/schema".
          #
          # Validation strategy: TRUST MAIN'S SCHEMA. The main-branch
          # schema is the fail-closed contract; a PR cannot redefine the
          # validation rules for its own artifacts.
          #
          # NARROW BOOTSTRAP SHIM for adding a new reviewer role: if the
          # artifact's `role` value is not in main's enum AND the PR-head
          # schema includes the new role as a strict SUPERSET of main's
          # enum (no roles removed, no other vocabulary changes), validate
          # the artifact against the PR-head schema. This permits the
          # bootstrap of a new role without letting a PR weaken existing
          # contracts.
          MAIN_SCHEMA=".github/scripts/review/schema/reviewer-v1.json"
          PR_SCHEMA="${PR_WORKSPACE_PATH}/.github/scripts/review/schema/reviewer-v1.json"
          ROLE_VALUE=$(jq -r '.role' "$ARTIFACT")
          if jq -e --arg r "$ROLE_VALUE" '.properties.role.enum | index($r) != null' "$MAIN_SCHEMA" > /dev/null; then
            # Role is in main's enum — main schema is authoritative.
            npx -y ajv-cli@5 validate --spec=draft2020 -s "$MAIN_SCHEMA" -d "$ARTIFACT"
          else
            # Role is new in this PR. Require PR-head schema to be a
            # strict superset of main's before trusting it.
            MAIN_ROLES=$(jq -r '.properties.role.enum | sort | join(",")' "$MAIN_SCHEMA")
            PR_ROLES=$(jq -r '.properties.role.enum | sort | join(",")' "$PR_SCHEMA")
            for role in $(echo "$MAIN_ROLES" | tr ',' ' '); do
              if ! echo ",${PR_ROLES}," | grep -q ",${role},"; then
                echo "ERROR: PR-head schema removes role '$role' that exists in main. Refusing bootstrap shim." >&2
                exit 1
              fi
            done
            UNION_ENUM=$(jq -s '[ .[0].properties.role.enum[], .[1].properties.role.enum[] ] | unique' \
              "$MAIN_SCHEMA" "$PR_SCHEMA")
            TEMP_SCHEMA=$(mktemp /tmp/bootstrap-reviewer-XXXXXX.json)
            jq --argjson u "$UNION_ENUM" '.properties.role.enum = $u' "$MAIN_SCHEMA" > "$TEMP_SCHEMA"
            echo "Role '$ROLE_VALUE' not in main's enum; bootstrap shim validating against derived temp schema."
            npx -y ajv-cli@5 validate --spec=draft2020 -s "$TEMP_SCHEMA" -d "$ARTIFACT"
            rm -f "$TEMP_SCHEMA"
          fi

      - name: Publish as GitHub PR Review
        if: inputs.publish == 'true'
        uses: ./.github/actions/review-publish
        with:
          artifact_path: ${{ steps.run.outputs.result_json }}
          pr_number: ${{ inputs.pr_number }}
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Write per-role commit status
        if: inputs.write_status == 'true'
        uses: ./.github/actions/review-state
        with:
          op: write-status
          sha: ${{ inputs.reviewed_sha }}
          context: review/reviewer-${{ inputs.role }}
          state: success
          description: 'cycle=${{ inputs.cycle }}'
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Upload reviewer artifact
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.role }}-${{ inputs.reviewed_sha }}
          path: |
            ${{ env.PR_WORKSPACE_PATH }}/.review-output/${{ inputs.role }}-result.json
            ${{ env.PR_WORKSPACE_PATH }}/.review-output/${{ inputs.role }}-output.jsonl
            ${{ env.PR_WORKSPACE_PATH }}/.review-output/${{ inputs.role }}-comment-url.txt
