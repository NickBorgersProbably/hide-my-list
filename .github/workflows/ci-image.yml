name: CI Image

# Builds and pushes the CI agent image defined in `.github/ci/Dockerfile`.
# This image is consumed by every CI agent workflow (codex,
# codex-diagnose-workflow-failure, review-coverage-evaluator,
# review-reviewer, review-fixer) and is distinct from the devcontainer
# image used for human IDE workflows.
#
# Security: matches the existing devcontainer-build property — pushes
# only happen from `main`, never from PR branches.

on:
  push:
    branches: [main]
    paths:
      - '.github/ci/**'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to GHCR after build'
        type: boolean
        default: true
      tag:
        description: 'Image tag (default: latest)'
        type: string
        default: latest

concurrency:
  group: ci-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nickborgersprobably/hide-my-list-ci

jobs:
  build:
    name: Build + push CI image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load pinned CLI versions
        run: |
          set -eux
          # $GITHUB_ENV rejects comment/blank lines — strip them.
          grep -Ev '^\s*(#|$)' .github/ci/versions.env >> "$GITHUB_ENV"

      - name: Resolve tag
        id: tag
        run: |
          set -eux
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/ci/Dockerfile
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            CODEX_CLI_VERSION=${{ env.CODEX_CLI_VERSION }}
            ACTIONLINT_VERSION=${{ env.ACTIONLINT_VERSION }}
            NODE_MAJOR=${{ env.NODE_MAJOR }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          {
            echo "### CI image build"
            echo ""
            echo "- Image: \`${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\`"
            echo "- SHA: \`${{ env.IMAGE_NAME }}:${{ github.sha }}\`"
            echo "- Claude Code: \`${{ env.CLAUDE_CODE_VERSION }}\`"
            echo "- Codex CLI: \`${{ env.CODEX_CLI_VERSION }}\`"
            echo "- actionlint: \`${{ env.ACTIONLINT_VERSION }}\`"
            echo "- Node major: \`${{ env.NODE_MAJOR }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
