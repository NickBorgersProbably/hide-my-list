name: Run command in devcontainer
description: >
  Runs a command inside a pre-built devcontainer image using plain
  `docker run` instead of devcontainers/ci, avoiding the known
  runner bug where the post-step cleanup crashes with
  "Index was out of range".

inputs:
  image:
    description: Devcontainer image to run (e.g. ghcr.io/org/repo-devcontainer)
    required: true
  run_cmd:
    description: Shell commands to execute inside the container
    required: true
  env:
    description: >
      Newline-separated KEY=VALUE pairs forwarded as container
      environment variables. Blank lines and lines starting with #
      are ignored.
    required: false
    default: ''
  workdir:
    description: Host directory mounted as /workspace (default '.')
    required: false
    default: '.'
  pull:
    description: Pull the image before running (set to 'false' to skip)
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Prepare script
      id: prepare-script
      shell: bash
      run: |
        SCRIPT=$(mktemp /tmp/devcontainer-run-XXXXXX.sh)
        cat > "$SCRIPT" <<'RUNCMD'
        ${{ inputs.run_cmd }}
        RUNCMD
        chmod +x "$SCRIPT"
        echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"

    - name: Run in devcontainer
      shell: bash
      run: |
        # Optionally pull the image
        if [ "${{ inputs.pull }}" != "false" ]; then
          docker pull "${{ inputs.image }}"
        fi

        # Build -e flags from the env input
        ENV_ARGS=()
        while IFS= read -r line; do
          # skip blank lines and comments
          [[ -z "$line" || "$line" == \#* ]] && continue
          ENV_ARGS+=( -e "$line" )
        done <<'ENVEOF'
        ${{ inputs.env }}
        ENVEOF

        # Ensure mount-source directories exist
        mkdir -p ~/.config/gh ~/.claude ~/.codex

        docker run --rm --init \
          --user vscode \
          --workdir /workspace \
          -v "${{ github.workspace }}:/workspace" \
          -v "${{ steps.prepare-script.outputs.script }}:/tmp/devcontainer-run.sh:ro" \
          -v "$HOME/.config/gh:/home/vscode/.config/gh" \
          -v "$HOME/.claude:/home/vscode/.claude" \
          -v "$HOME/.codex:/home/vscode/.codex" \
          "${ENV_ARGS[@]}" \
          "${{ inputs.image }}" \
          bash -lc 'set -euo pipefail; /tmp/devcontainer-run.sh'
