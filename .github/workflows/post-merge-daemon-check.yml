name: Post-Merge Daemon Script Check

# Detects new or changed daemon scripts after PR merges.
# Replaces the expensive per-heartbeat git diff analysis with a one-time
# post-merge check. See issue #97.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'

jobs:
  check-daemon-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find merged PR
        id: find-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number // empty' 2>/dev/null || echo "")
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Detect daemon script changes
        id: detect
        run: |
          # Compare HEAD with its parent to find changed files
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'scripts/*daemon*' 'scripts/*-daemon*' || true)

          if [ -z "$CHANGED" ]; then
            echo "No daemon script changes detected."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Daemon script changes detected:"
            echo "$CHANGED"
            echo "found=true" >> "$GITHUB_OUTPUT"

            # Build a summary of what changed
            SUMMARY=""
            for file in $CHANGED; do
              if git diff --diff-filter=A --name-only HEAD~1 HEAD -- "$file" | grep -q .; then
                SUMMARY="${SUMMARY}- **Added:** \`${file}\`"$'\n'
              else
                SUMMARY="${SUMMARY}- **Modified:** \`${file}\`"$'\n'
              fi
            done

            {
              echo "summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on merged PR
        if: steps.detect.outputs.found == 'true' && steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          SUMMARY="${{ steps.detect.outputs.summary }}"

          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ## Daemon Script Changes Detected

          This merge includes changes to daemon scripts:

          ${SUMMARY}
          The agent should review these changes to update its awareness of available daemons and their configurations.
          EOF
          )"
