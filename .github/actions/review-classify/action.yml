---
name: Review pipeline file classifier
description: >
  Single source of truth for "which reviewer roles apply to this SHA"
  in the v2 review pipeline. Classifies the SHA-bound diff and emits
  a JSON list of applicable roles.

  Today the rules are:
    - design:    always
    - docs:      always
    - security:  always for workflow/action/review/runtime-script changes,
                 otherwise unless docs_only (all changed files are inert docs)
    - psych:     unless config_only (pure CI/infrastructure config)
    - prompt:    unless config_only (pure CI/infrastructure config)

  These mirror the conditions hardcoded across the current monolith's
  reviewer jobs (lines ~520-552 + per-reviewer if:). Centralizing them
  here means adding a new role is one matrix entry + one new prompt
  file, with no scattered if-conditions to update.

  See agentic-pipeline-learnings.md §1.9 and §1.12: spec-critical
  and reviewer-prompt .md files must NOT be classified as inert docs
  or config just because they end in .md. The classifier carves out
  AGENTS.md, SOUL.md, TOOLS.md, HEARTBEAT.md, setup/cron/*,
  design/adhd-priorities.md, and .github/scripts/review/prompts/*.md.

inputs:
  base_ref:
    description: Base ref to diff against
    required: false
    default: origin/main
  base_sha:
    description: Immutable base SHA to diff against when available
    required: false
  head_sha:
    description: Head SHA being reviewed
    required: true

outputs:
  roles_json:
    description: JSON array of applicable role names
    value: ${{ steps.classify.outputs.roles_json }}
  docs_only:
    description: '"true" if the diff only touches inert documentation'
    value: ${{ steps.classify.outputs.docs_only }}
  config_only:
    description: '"true" if the diff only touches CI/infrastructure config'
    value: ${{ steps.classify.outputs.config_only }}

runs:
  using: composite
  steps:
    - name: Classify changed files
      id: classify
      shell: bash
      env:
        BASE_REF: ${{ inputs.base_ref }}
        BASE_SHA: ${{ inputs.base_sha }}
        HEAD_SHA: ${{ inputs.head_sha }}
      run: |
        set -euo pipefail

        node .github/scripts/review/classify.mjs
