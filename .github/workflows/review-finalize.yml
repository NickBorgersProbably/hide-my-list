---
name: Review pipeline v2 — finalize
# Reusable: invoked at the tail of every pipeline run.
#
# On GO: stamps review/cycle-N on the post-fix SHA, leaves the PR alone.
# Optional `followup_issues[]` from reviewer artifacts are ONLY created
# after the PR actually merges; that path lives in the post-merge
# coverage workflow, not here.
#
# On NO-GO: stamps review/cycle-N, applies the `needs-human-review`
# label, and posts ONE sticky comment summarizing unaddressed blockers.
# Never closes the PR. Never creates an issue. (User decision: avoid
# the lessons-learned-issue → new PR → NO-GO infinite loop class.)

on:
  workflow_call:
    inputs:
      pr_number:
        type: string
        required: true
      post_fix_sha:
        type: string
        required: true
      cycle:
        type: string
        required: true
      verdict:
        type: string
        required: true
    secrets:
      WORKFLOW_PAT:
        required: true

permissions:
  # Read-only GITHUB_TOKEN. The label create, sticky comment, and
  # cycle-status write all authenticate via secrets.WORKFLOW_PAT,
  # not GITHUB_TOKEN.
  contents: read
  pull-requests: read
  issues: read
  statuses: write

jobs:
  finalize:
    name: Finalize ${{ inputs.verdict }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (for composite actions)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Stamp review/cycle on post-fix SHA
        uses: ./.github/actions/review-state
        with:
          op: write-status
          sha: ${{ inputs.post_fix_sha }}
          context: review/cycle
          state: success
          description: ${{ inputs.cycle }}
          github_token: ${{ secrets.WORKFLOW_PAT }}

      - name: Download verdict artifact
        uses: actions/download-artifact@v4
        with:
          path: /tmp/verdict
          name: verdict-${{ inputs.post_fix_sha }}

      # Write the v1-compatible "All Required Agent Reviews" merge-gate
      # status using GITHUB_TOKEN (the Actions native integration,
      # integration_id 15368). The repo's branch protection ruleset
      # requires this exact context published by THAT specific
      # integration; statuses written by a personal PAT (User type)
      # do NOT satisfy the rule. v1's all-reviews-passed job used
      # github-script with GITHUB_TOKEN, which is what we mirror here.
      - name: Publish "All Required Agent Reviews" merge-gate status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const verdict = ${{ toJSON(inputs.verdict) }};
            const sha = ${{ toJSON(inputs.post_fix_sha) }};
            const state = verdict === 'GO' ? 'success' : 'failure';
            const description = verdict === 'GO'
              ? 'v2 verdict: GO'
              : 'v2 verdict: NO-GO; needs-human-review';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'All Required Agent Reviews',
              description,
            });
            core.info(`Wrote All Required Agent Reviews=${state} on ${sha}`);

      - name: Apply NO-GO label and sticky comment
        if: inputs.verdict == 'NO-GO'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          POST_FIX_SHA: ${{ inputs.post_fix_sha }}
        run: |
          set -euo pipefail

          # Remove any stale agent-reviews-passed label from a prior cycle.
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label agent-reviews-passed 2>/dev/null || true

          # Idempotent label create.
          gh label create needs-human-review \
            --color B60205 \
            --description "Review pipeline v2 could not converge; human takeover needed" \
            --repo "$REPO" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label needs-human-review

          REASONS=$(jq -r '.reasons[]? // empty' /tmp/verdict/verdict-${{ inputs.post_fix_sha }}.json | sed 's/^/- /')
          BLOCKERS=$(jq -r '.unaddressed_blocker_ids[]? // empty' /tmp/verdict/verdict-${{ inputs.post_fix_sha }}.json | sed 's/^/- /')

          BODY_FILE=$(mktemp)
          {
            echo "<!-- codex-merge-decision -->"
            echo "<!-- review-pipeline-v2:no-go -->"
            echo "## Merge Decision"
            echo
            echo "**Decision: NO-GO**"
            echo
            echo "The autonomous review pipeline could not converge on this PR after cycle ${{ inputs.cycle }}. A human needs to take a look."
            echo
            echo "**The PR is intentionally left open.** Nothing has been auto-closed and no replacement issue has been auto-filed (loop-prevention)."
            echo
            if [ -n "$REASONS" ]; then
              echo "### Reasons"
              echo "$REASONS"
              echo
            fi
            if [ -n "$BLOCKERS" ]; then
              echo "### Unaddressed blockers"
              echo "$BLOCKERS"
              echo
            fi
            echo "<sub>Posted by review-pipeline v2 (cycle ${{ inputs.cycle }}).</sub>"
          } > "$BODY_FILE"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$BODY_FILE"
          rm -f "$BODY_FILE"

      - name: Mark GO success and post Merge Decision comment
        if: inputs.verdict == 'GO'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          POST_FIX_SHA: ${{ inputs.post_fix_sha }}
        run: |
          set -euo pipefail

          # Remove any stale needs-human-review label from a prior cycle.
          gh pr edit "$PR_NUMBER" --repo "$REPO" --remove-label needs-human-review 2>/dev/null || true

          # Apply the v1-compatible "agent-reviews-passed" label so the
          # PR shows a clear human-visible indicator that v2 cleared it.
          # Idempotent label create + add.
          gh label create agent-reviews-passed \
            --color 0E8A16 \
            --description "All required agent reviews passed (v2)" \
            --repo "$REPO" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label agent-reviews-passed

          REASONS=$(jq -r '.reasons[]? // empty' /tmp/verdict/verdict-${{ inputs.post_fix_sha }}.json | sed 's/^/- /')

          # Post a single Merge Decision comment so humans can see the
          # verdict at a glance. Uses the same `<!-- codex-merge-decision -->`
          # marker the legacy v1 monolith used so any downstream
          # automation that scrapes for the marker continues to work.
          BODY_FILE=$(mktemp)
          {
            echo "<!-- codex-merge-decision -->"
            echo "<!-- review-pipeline-v2:go -->"
            echo "## Merge Decision"
            echo
            echo "**Decision: GO**"
            echo
            if [ -n "$REASONS" ]; then
              echo "### Rationale"
              echo "$REASONS"
              echo
            fi
            echo "Reviewed at \`${{ inputs.post_fix_sha }}\` (cycle ${{ inputs.cycle }})."
            echo
            echo "<sub>Posted by review-pipeline v2.</sub>"
          } > "$BODY_FILE"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file "$BODY_FILE"
          rm -f "$BODY_FILE"

          echo "review-pipeline-v2: GO on cycle ${{ inputs.cycle }}"
