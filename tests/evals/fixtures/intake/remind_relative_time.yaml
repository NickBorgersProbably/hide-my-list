---
# Bug-class 5 surface: when a user says "remind me in 10 minutes", the
# intake LLM must return is_reminder=true with a parseable ISO 8601
# remind_at timestamp. A cheaper model (gemma4-small) may produce
# malformed JSON or wrong field names — this fixture catches that.
id: intake-remind-relative-001
node: intake
tier: medium
peer: "<test-peer-3>"
inbound: "remind me to take the trash out in 10 minutes"
prior_state:
  active_task: null
  conversation_state: idle
  user_prefs:
    timezone: America/Chicago
contracts:
  # NOTE: intake's structured JSON output (is_reminder, remind_at) is
  # validated upstream by unit tests in tests/integration/test_intake.py
  # which mock the LLM with parsed JSON. Eval contracts here validate the
  # USER-VISIBLE confirmation text the intake_node populates into
  # pending_outbound. JSON schema validation against that text would
  # always fail (confirmation is prose, not JSON) so json_schema is
  # intentionally NOT used here.
  - kind: regex_require
    pattern: "(?i)(remind|reminder).*(\\d+\\s*(min|minute)|10:?\\d{2})"
  - kind: judge
    rubric: |
      The user-visible response confirms a reminder was set for ~10
      minutes from now AND names what the reminder is for (taking the
      trash out). It does NOT mention internal infrastructure (cron,
      worker, queue). Score 1.0 for both, 0.5 for one, 0.0 for neither.
    threshold: 0.7
