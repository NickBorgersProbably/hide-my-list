version: "3.9"

# Internal network: app <-> postgres <-> signal-cli
# No host firewall rules are specified here.
# Deployment-side egress enforcement is the infra agent's concern.
# Documented outbound dependencies (for the infra/VM operator):
#   - api.notion.com        (Notion CRUD)
#   - LLM proxy endpoint    (configured by LLM_PROXY_BASE_URL)
#   - api.openai.com        (reward image generation)
#   - Signal infrastructure  (managed by signal-cli container)

networks:
  internal:
    driver: bridge

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY:-}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID:-}
      - LLM_PROXY_API_KEY=${LLM_PROXY_API_KEY:-}
      - LLM_PROXY_BASE_URL=${LLM_PROXY_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATABASE_URL=postgresql://hml:hml@postgres:5432/hml
      - SIGNAL_CLI_URL=http://signal-cli:8080
      # SIGNAL_ACCOUNT: E.164 phone number registered with signal-cli (required).
      - SIGNAL_ACCOUNT=${SIGNAL_ACCOUNT:-}
      # AUTHORIZED_PEERS: comma-separated E.164 numbers permitted to message the
      # bot. Notion is single-tenant; any inbound peer can read all tasks unless
      # gated here. Empty/unset = refuse to start (fail-safe closed default).
      - AUTHORIZED_PEERS=${AUTHORIZED_PEERS:-}
      - LOG_FILE=${LOG_FILE:-}
      # LangSmith guard: requires explicit opt-in with ALLOW_PRIVATE_TRACE_EXPORT=true
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - ALLOW_PRIVATE_TRACE_EXPORT=${ALLOW_PRIVATE_TRACE_EXPORT:-false}
      - USER_TZ=${USER_TZ:-America/Chicago}
      # Deadline reminder slot size and max rows per slot bucket.
      - REMINDER_SLOT_MINUTES=${REMINDER_SLOT_MINUTES:-30}
      - REMINDER_SLOT_CAPACITY=${REMINDER_SLOT_CAPACITY:-2}
      # User-local quiet-hour bounds for deadline reminder slot assignment.
      - REMINDER_QUIET_START_HOUR=${REMINDER_QUIET_START_HOUR:-22}
      - REMINDER_QUIET_END_HOUR=${REMINDER_QUIET_END_HOUR:-8}
      - OPS_ALERT_SIGNAL_NUMBER=${OPS_ALERT_SIGNAL_NUMBER:-}
      # Signal ingress liveness controls.
      # SIGNAL_RECEIVE_IDLE_TIMEOUT_SECONDS: receive WebSocket idle deadline before reconnect (default 300).
      - SIGNAL_RECEIVE_IDLE_TIMEOUT_SECONDS=${SIGNAL_RECEIVE_IDLE_TIMEOUT_SECONDS:-300}
      # SIGNAL_INGRESS_SILENCE_CHECK_INTERVAL_MINUTES: interval for silence check job (default 60).
      - SIGNAL_INGRESS_SILENCE_CHECK_INTERVAL_MINUTES=${SIGNAL_INGRESS_SILENCE_CHECK_INTERVAL_MINUTES:-60}
      # SIGNAL_INBOUND_SILENCE_ALERT_THRESHOLD_SECONDS: inbound silence before critical alert (default 129600 = 36 h).
      - SIGNAL_INBOUND_SILENCE_ALERT_THRESHOLD_SECONDS=${SIGNAL_INBOUND_SILENCE_ALERT_THRESHOLD_SECONDS:-129600}
      # REWARD_ARTIFACTS_DIR: mount path for generated PNG reward images.
      # Must match the volume mount below so images persist across container restarts.
      - REWARD_ARTIFACTS_DIR=/data/reward_artifacts
    volumes:
      - reward-artifacts:/data/reward_artifacts
      - ${HML_LOG_DIR:-/tmp/hml-logs}:/var/log/hml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: on-failure

  signal-cli:
    # Image pinned by sha256 digest.
    # Lookup: docker pull bbernhard/signal-cli-rest-api:latest
    #         docker inspect bbernhard/signal-cli-rest-api:latest --format='{{index .RepoDigests 0}}'
    # Pinned: 2026-07-19 against bbernhard/signal-cli-rest-api:latest
    image: bbernhard/signal-cli-rest-api@sha256:2399d449123cdad56c4d859277e3b9127e1a00c4d2ab4601c239882609286cf8
    environment:
      - MODE=json-rpc
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hml
      - POSTGRES_PASSWORD=hml
      - POSTGRES_DB=hml
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hml -d hml"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
  signal-cli-data:
  reward-artifacts:
