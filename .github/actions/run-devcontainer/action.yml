name: Run command in devcontainer
description: >
  Runs a command inside a pre-built devcontainer image using the
  devcontainer CLI directly, avoiding the devcontainers/ci post-step
  cleanup crash while preserving the repository's devcontainer
  lifecycle hooks.

inputs:
  image:
    description: Devcontainer image to run (e.g. ghcr.io/org/repo-devcontainer)
    required: true
  workspace_folder:
    description: Repo checkout path to mount into the devcontainer
    required: false
    default: '.'
  run_cmd:
    description: Shell commands to execute inside the container
    required: true
  env:
    description: >
      Newline-separated KEY=VALUE pairs forwarded as container
      environment variables. Blank lines and lines starting with #
      are ignored.
    required: false
    default: ''
  workdir:
    description: Repo-relative working directory for the command
    required: false
    default: '.'
  pull:
    description: Pull the image before running (set to 'false' to skip)
    required: false
    default: 'true'
  sanitize_mounts:
    description: >
      Remove devcontainer mounts from the generated override config. Enable
      this for untrusted PR review jobs running on GitHub-hosted runners.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Prepare script
      id: prepare-script
      shell: bash
      run: |
        WORKSPACE="${{ github.workspace }}"
        if [ "${{ inputs.workspace_folder }}" != "." ]; then
          WORKSPACE="$WORKSPACE/${{ inputs.workspace_folder }}"
        fi

        SCRIPT=$(mktemp "$WORKSPACE/.git/devcontainer-run-XXXXXX.sh")
        cat > "$SCRIPT" <<'RUNCMD'
        set -euo pipefail
        cd '${{ inputs.workdir }}'
        ${{ inputs.run_cmd }}
        RUNCMD
        chmod +x "$SCRIPT"
        echo "script=$SCRIPT" >> "$GITHUB_OUTPUT"

    - name: Run in devcontainer
      shell: bash
      run: |
        set -euo pipefail

        sanitize_ssh_agent_forwarding() {
          if [ -z "${SSH_AUTH_SOCK:-}" ]; then
            echo \
              "SSH_AUTH_SOCK is empty or unset; disabling SSH agent" \
              "forwarding for devcontainer CLI."
            unset SSH_AUTH_SOCK SSH_AGENT_PID
            return
          fi

          if [ ! -S "$SSH_AUTH_SOCK" ]; then
            echo \
              "SSH_AUTH_SOCK='$SSH_AUTH_SOCK' is not a live socket;" \
              "disabling SSH agent forwarding for devcontainer CLI."
            unset SSH_AUTH_SOCK SSH_AGENT_PID
          fi
        }

        WORKSPACE="${{ github.workspace }}"
        if [ "${{ inputs.workspace_folder }}" != "." ]; then
          WORKSPACE="$WORKSPACE/${{ inputs.workspace_folder }}"
        fi
        SCRIPT_PATH="${{ steps.prepare-script.outputs.script }}"
        OVERRIDE_CONFIG=$(mktemp /tmp/devcontainer-override-XXXXXX.json)
        cleanup() {
          rm -f "$OVERRIDE_CONFIG" "$SCRIPT_PATH"
        }
        trap cleanup EXIT

        # Optionally pull the image
        if [ "${{ inputs.pull }}" != "false" ]; then
          docker pull "${{ inputs.image }}"
        fi

        python3 \
          - \
          "$WORKSPACE/.devcontainer/devcontainer.json" \
          "$OVERRIDE_CONFIG" \
          "${{ inputs.image }}" \
          "${{ inputs.sanitize_mounts }}" <<'PY'
        import json
        import sys

        source_path, target_path, image, sanitize_mounts = sys.argv[1:5]
        with open(source_path, "r", encoding="utf-8") as handle:
            config = json.load(handle)

        config.pop("build", None)
        config.pop("initializeCommand", None)
        if sanitize_mounts.lower() == "true":
            # GitHub-hosted PR review jobs do not guarantee an SSH agent
            # socket, so untrusted bind mounts must not flow into the trusted
            # override config used to launch the container.
            config.pop("mounts", None)
        config["image"] = image

        with open(target_path, "w", encoding="utf-8") as handle:
            json.dump(config, handle, indent=2)
            handle.write("\n")
        PY

        # Forward remote env vars to both lifecycle hooks and the target
        # command.
        REMOTE_ENV_ARGS=()
        while IFS= read -r line; do
          [[ -z "$line" || "$line" == \#* ]] && continue
          REMOTE_ENV_ARGS+=( --remote-env "$line" )
        done <<'ENVEOF'
        ${{ inputs.env }}
        ENVEOF

        # Prevent the devcontainer CLI from synthesizing an empty bind mount
        # when a runner exports SSH_AUTH_SOCK without a usable agent socket.
        sanitize_ssh_agent_forwarding

        npx -y @devcontainers/cli up \
          --workspace-folder "$WORKSPACE" \
          --override-config "$OVERRIDE_CONFIG" \
          --remove-existing-container \
          --skip-post-attach \
          "${REMOTE_ENV_ARGS[@]}"

        SCRIPT_NAME=$(basename "$SCRIPT_PATH")

        npx -y @devcontainers/cli exec \
          --workspace-folder "$WORKSPACE" \
          --override-config "$OVERRIDE_CONFIG" \
          "${REMOTE_ENV_ARGS[@]}" \
          bash -lc "bash '.git/$SCRIPT_NAME'"
