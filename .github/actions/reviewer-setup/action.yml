name: 'Reviewer Setup'
description: 'Shared setup for all Claude Code review jobs: verify PR Tests passed on the current PR head'

inputs:
  pr_number:
    description: 'PR number to review'
    required: true
  head_ref:
    description: 'PR branch name'
    required: true
  head_repo:
    description: 'PR repository (owner/repo)'
    required: true
  github_token:
    description: 'GitHub token for API calls and GHCR login'
    required: true
  repository:
    description: 'Repository (owner/repo) for API calls'
    required: true
  pr_tests_run_id:
    description: 'Workflow run ID for the PR Tests execution that verified this PR head'
    required: false
    default: ''

outputs:
  verified:
    description: 'Whether PR Tests passed for the current PR head (true/false)'
    value: ${{ steps.verify-tests.outputs.verified }}
  head_sha:
    description: 'Current PR head SHA that was verified against PR Tests'
    value: ${{ steps.verify-tests.outputs.head_sha }}

runs:
  using: 'composite'
  steps:
    - name: Verify PR Tests passed on current commit
      id: verify-tests
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        # Compare PR Tests against the current PR head so reviewers never run on stale code.
        HEAD_SHA=$(gh api repos/${{ inputs.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.sha')
        export HEAD_SHA
        echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
        echo "Checking PR Tests status for commit $HEAD_SHA"

        get_run_json() {
          if [ -n "${{ inputs.pr_tests_run_id }}" ]; then
            gh api repos/${{ inputs.repository }}/actions/runs/${{ inputs.pr_tests_run_id }} 2>/dev/null
          else
            gh api "repos/${{ inputs.repository }}/actions/workflows/pr-tests.yml/runs?branch=${{ inputs.head_ref }}&status=completed&per_page=20" \
              --jq '[.workflow_runs[]
                | select(.head_sha == env.HEAD_SHA)]
                | sort_by(.run_number)
                | last'
          fi
        }

        MAX_ATTEMPTS=10
        ATTEMPT=1
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          RUN_JSON=$(get_run_json || echo "")
          RUN_NAME=$(echo "$RUN_JSON" | jq -r '.name // ""' 2>/dev/null || echo "")
          RUN_PATH=$(echo "$RUN_JSON" | jq -r '.path // ""' 2>/dev/null || echo "")
          RUN_STATUS=$(echo "$RUN_JSON" | jq -r '.status // ""' 2>/dev/null || echo "")
          RUN_CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // ""' 2>/dev/null || echo "")
          RUN_HEAD_SHA=$(echo "$RUN_JSON" | jq -r '.head_sha // ""' 2>/dev/null || echo "")
          STATUS="${RUN_STATUS:-not found}/${RUN_CONCLUSION:-not found}"
          RETRYABLE=true

          if [ -n "$RUN_JSON" ] && [ "$RUN_JSON" != "null" ]; then
            if [ "$RUN_PATH" != ".github/workflows/pr-tests.yml" ]; then
              STATUS="unexpected workflow path ${RUN_PATH:-missing path} (${RUN_NAME:-unknown})"
              RETRYABLE=false
            elif [ "$RUN_NAME" != "PR Tests" ]; then
              echo "Warning: expected workflow name 'PR Tests' but found '${RUN_NAME:-unknown}'"
            fi

            if [ "$RETRYABLE" = "true" ] && [ "$RUN_HEAD_SHA" != "$HEAD_SHA" ]; then
              STATUS="head SHA mismatch (${RUN_HEAD_SHA:-missing})"
              RETRYABLE=false
            elif [ "$RETRYABLE" = "true" ] && [ "$RUN_STATUS" = "completed" ] && [ "$RUN_CONCLUSION" = "success" ]; then
              echo "PR Tests passed for current commit"
              echo "verified=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            STATUS="not found"
          fi

          if [ "$RETRYABLE" != "true" ]; then
            echo "PR Tests cannot verify the current commit: $STATUS"
            echo "Skipping review - a new PR Tests/code review cycle is required"
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: PR Tests run not ready yet (status: $STATUS), waiting 10s..."
            sleep 10
          fi
          ATTEMPT=$((ATTEMPT + 1))
        done

        echo "PR Tests did not verify the current commit after $MAX_ATTEMPTS attempts (status: $STATUS)"
        echo "Skipping review - tests must pass on the current PR head first"
        echo "verified=false" >> $GITHUB_OUTPUT
