name: 'Reviewer Setup'
description: 'Shared setup for all Claude Code review jobs: verify tests, checkout PR, login to GHCR'

inputs:
  pr_number:
    description: 'PR number to review'
    required: true
  head_ref:
    description: 'PR branch name'
    required: true
  head_repo:
    description: 'PR repository (owner/repo)'
    required: true
  github_token:
    description: 'GitHub token for API calls and GHCR login'
    required: true
  repository:
    description: 'Repository (owner/repo) for API calls'
    required: true
  checkout_token:
    description: 'Token for checkout (defaults to github_token, use WORKFLOW_PAT for merge-decision)'
    required: false
    default: ''
  pr_tests_run_id:
    description: 'Workflow run ID for the PR Tests execution that verified this PR head'
    required: false
    default: ''

outputs:
  verified:
    description: 'Whether PR Tests passed for the current PR head (true/false)'
    value: ${{ steps.verify-tests.outputs.verified }}
  exists:
    description: 'Whether the PR branch still exists on the remote (true/false)'
    value: ${{ steps.final-branch-state.outputs.exists }}

runs:
  using: 'composite'
  steps:
    - name: Check if PR branch still exists
      id: check-branch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        HEAD_REF: ${{ inputs.head_ref }}
        HEAD_REPO: ${{ inputs.head_repo }}
      run: |
        # URL-encode the branch name for the API call (handles slashes, etc.)
        ENCODED_BRANCH=$(python3 - <<'PY'
        import os
        import urllib.parse
        print(urllib.parse.quote(os.environ["HEAD_REF"], safe=""))
        PY
        )
        set +e
        RESPONSE=$(gh api "repos/${HEAD_REPO}/branches/${ENCODED_BRANCH}" --silent --include 2>&1)
        GH_EXIT=$?
        set -e
        HTTP_STATUS=$(printf '%s\n' "$RESPONSE" | awk 'toupper($1) ~ /^HTTP/ {print $2; exit}')
        if [ "$HTTP_STATUS" = "200" ]; then
          echo "Branch '${HEAD_REF}' exists"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        elif [ "$HTTP_STATUS" = "404" ]; then
          echo "Branch '${HEAD_REF}' does not exist (HTTP 404) - PR was likely merged and branch deleted"
          echo "exists=false" >> "$GITHUB_OUTPUT"
        else
          echo "Failed to verify branch '${HEAD_REF}' in '${HEAD_REPO}' (gh exit ${GH_EXIT}, HTTP ${HTTP_STATUS:-unknown})"
          printf '%s\n' "$RESPONSE"
          exit 1
        fi

    - name: Verify PR Tests passed on current commit
      id: verify-tests
      if: steps.check-branch.outputs.exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        HEAD_REF: ${{ inputs.head_ref }}
        PR_TESTS_RUN_ID: ${{ inputs.pr_tests_run_id }}
      run: |
        # Compare PR Tests against the current PR head so reviewers never run on stale code.
        export HEAD_SHA=$(gh api repos/${{ inputs.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.sha')
        export ENCODED_HEAD_REF=$(python3 - <<'PY'
        import os
        import urllib.parse
        print(urllib.parse.quote(os.environ["HEAD_REF"], safe=""))
        PY
        )
        echo "Checking PR Tests status for commit $HEAD_SHA"

        get_run_json() {
          if [ -n "${PR_TESTS_RUN_ID}" ]; then
            gh api repos/${{ inputs.repository }}/actions/runs/${PR_TESTS_RUN_ID} 2>/dev/null
          else
            gh api "repos/${{ inputs.repository }}/actions/workflows/pr-tests.yml/runs?branch=${ENCODED_HEAD_REF}&status=completed&per_page=20" \
              --jq '[.workflow_runs[]
                | select(.head_sha == env.HEAD_SHA)]
                | sort_by(.run_number)
                | last'
          fi
        }

        MAX_ATTEMPTS=40
        ATTEMPT=1
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          RUN_JSON=$(get_run_json || echo "")
          RUN_NAME=$(echo "$RUN_JSON" | jq -r '.name // ""' 2>/dev/null || echo "")
          RUN_PATH=$(echo "$RUN_JSON" | jq -r '.path // ""' 2>/dev/null || echo "")
          RUN_STATUS=$(echo "$RUN_JSON" | jq -r '.status // ""' 2>/dev/null || echo "")
          RUN_CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // ""' 2>/dev/null || echo "")
          RUN_HEAD_SHA=$(echo "$RUN_JSON" | jq -r '.head_sha // ""' 2>/dev/null || echo "")
          STATUS="${RUN_STATUS:-not found}/${RUN_CONCLUSION:-not found}"

          if [ -n "$RUN_JSON" ] && [ "$RUN_JSON" != "null" ]; then
            if [ "$RUN_NAME" != "PR Tests" ] && [ "$RUN_PATH" != ".github/workflows/pr-tests.yml" ]; then
              STATUS="unexpected workflow ${RUN_NAME:-unknown}"
            elif [ "$RUN_HEAD_SHA" != "$HEAD_SHA" ]; then
              STATUS="head SHA mismatch (${RUN_HEAD_SHA:-missing})"
            elif [ "$RUN_STATUS" = "completed" ] && [ "$RUN_CONCLUSION" = "success" ]; then
              echo "PR Tests passed for current commit"
              echo "verified=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            STATUS="not found"
          fi

          if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: PR Tests run not ready yet (status: $STATUS), waiting 10s..."
            sleep 10
          fi
          ATTEMPT=$((ATTEMPT + 1))
        done

        echo "PR Tests did not verify the current commit after $MAX_ATTEMPTS attempts (status: $STATUS)"
        echo "Skipping review - tests must pass on the current PR head first"
        echo "verified=false" >> $GITHUB_OUTPUT

    - name: Checkout PR branch
      id: checkout-branch
      if: steps.verify-tests.outputs.verified == 'true' && steps.check-branch.outputs.exists == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        CHECKOUT_TOKEN: ${{ inputs.checkout_token != '' && inputs.checkout_token || inputs.github_token }}
        HEAD_REF: ${{ inputs.head_ref }}
        HEAD_REPO: ${{ inputs.head_repo }}
      run: |
        branch_exists() {
          local encoded_branch response gh_exit http_status

          encoded_branch=$(python3 - <<'PY'
        import os
        import urllib.parse
        print(urllib.parse.quote(os.environ["HEAD_REF"], safe=""))
        PY
          )

          set +e
          response=$(gh api "repos/${HEAD_REPO}/branches/${encoded_branch}" --silent --include 2>&1)
          gh_exit=$?
          set -e
          http_status=$(printf '%s\n' "$response" | awk 'toupper($1) ~ /^HTTP/ {print $2; exit}')

          case "$http_status" in
            200)
              return 0
              ;;
            404)
              return 1
              ;;
            *)
              echo "Failed to verify branch '${HEAD_REF}' in '${HEAD_REPO}' immediately before checkout (gh exit ${gh_exit}, HTTP ${http_status:-unknown})"
              printf '%s\n' "$response"
              exit 1
              ;;
          esac
        }

        if ! branch_exists; then
          echo "Branch '${HEAD_REF}' disappeared before checkout; treating it as deleted"
          echo "exists=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        ASKPASS_SCRIPT=$(git rev-parse --git-path reviewer-askpass.sh)
        cat > "$ASKPASS_SCRIPT" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        token="${REVIEWER_SETUP_TOKEN:-${GH_TOKEN:-}}"
        if [ -z "$token" ]; then
          echo "Missing git credential token for reviewer setup" >&2
          exit 1
        fi

        case "${1:-}" in
          *Username*)
            printf '%s\n' 'x-access-token'
            ;;
          *)
            printf '%s\n' "$token"
            ;;
        esac
        EOF
        chmod 700 "$ASKPASS_SCRIPT"

        # Keep the workspace authenticated for later pull/push operations without
        # writing a tokenized remote URL or putting the token in argv.
        git config --local core.askPass "$ASKPASS_SCRIPT"
        git config --local credential.helper ""
        git config --local credential.useHttpPath true
        git config --local --unset-all http.https://github.com/.extraheader || true
        {
          echo "GIT_ASKPASS=$ASKPASS_SCRIPT"
          echo "GIT_TERMINAL_PROMPT=0"
          echo "REVIEWER_SETUP_TOKEN=$CHECKOUT_TOKEN"
        } >> "$GITHUB_ENV"

        FETCH_STDERR=$(mktemp)
        # Reuse the existing workspace checkout to avoid composite action
        # post-cleanup bugs while still switching to the PR head repo/ref.
        if ! GIT_TERMINAL_PROMPT=0 \
          REVIEWER_SETUP_TOKEN="$CHECKOUT_TOKEN" \
          git fetch --no-tags --prune "https://github.com/${HEAD_REPO}.git" \
            "refs/heads/${HEAD_REF}:refs/remotes/origin/${HEAD_REF}" 2>"$FETCH_STDERR"; then
          if grep -qiE "couldn't find remote ref|remote ref does not exist|could not find remote branch" "$FETCH_STDERR"; then
            echo "Branch '${HEAD_REF}' disappeared during fetch; treating it as deleted"
            cat "$FETCH_STDERR"
            rm -f "$FETCH_STDERR"
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat "$FETCH_STDERR"
          rm -f "$FETCH_STDERR"
          exit 1
        fi
        rm -f "$FETCH_STDERR"

        # Keep origin pointed at the PR head repo so later pull/push commands
        # behave the same way actions/checkout would for cross-repo PRs.
        git remote set-url origin "https://github.com/${HEAD_REPO}.git"
        git checkout --force -B "${HEAD_REF}" "refs/remotes/origin/${HEAD_REF}"
        git branch --set-upstream-to "origin/${HEAD_REF}" "${HEAD_REF}" || true
        echo "exists=true" >> "$GITHUB_OUTPUT"

    - name: Pull latest changes
      if: steps.verify-tests.outputs.verified == 'true' && steps.check-branch.outputs.exists == 'true'
      shell: bash
      env:
        HEAD_REF: ${{ inputs.head_ref }}
      run: git pull origin "$HEAD_REF" || true

    - name: Finalize branch state
      id: final-branch-state
      if: always()
      shell: bash
      env:
        INITIAL_EXISTS: ${{ steps.check-branch.outputs.exists }}
        VERIFIED: ${{ steps.verify-tests.outputs.verified }}
        CHECKOUT_EXISTS: ${{ steps.checkout-branch.outputs.exists }}
      run: |
        if [ "$INITIAL_EXISTS" != "true" ]; then
          echo "exists=false" >> "$GITHUB_OUTPUT"
        elif [ "$VERIFIED" = "true" ] && [ "$CHECKOUT_EXISTS" = "false" ]; then
          echo "exists=false" >> "$GITHUB_OUTPUT"
        else
          echo "exists=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create directories for devcontainer mounts
      if: steps.verify-tests.outputs.verified == 'true' && steps.check-branch.outputs.exists == 'true'
      shell: bash
      run: mkdir -p ~/.config/gh ~/.claude ~/.codex

    - name: Log in to GHCR
      if: steps.verify-tests.outputs.verified == 'true' && steps.check-branch.outputs.exists == 'true'
      shell: bash
      env:
        GHCR_TOKEN: ${{ inputs.github_token }}
      run: |
        # Use docker login directly instead of docker/login-action to avoid
        # composite action post-cleanup bug with conditional uses: steps.
        echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Log out of GHCR
      if: steps.verify-tests.outputs.verified == 'true' && steps.check-branch.outputs.exists == 'true'
      shell: bash
      run: |
        # Ensure cached GHCR credentials are cleared on persistent runners.
        docker logout ghcr.io >/dev/null 2>&1 || echo "GHCR logout skipped: no active session"
