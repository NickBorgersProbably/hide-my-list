---
name: Check Reminders

# Polls Notion every 5 minutes for due reminder tasks and writes a signal file
# that the OpenClaw agent picks up to deliver reminders to the user.
#
# This is the "heartbeat" that makes reminders fire even when the user isn't
# actively chatting. See docs/architecture.md for how it fits into the system.

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-reminders:
    name: Check Due Reminders
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run reminder check
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          REMINDER_SIGNAL_FILE: /tmp/reminder-signal.json
        run: |
          # Create a minimal .env for the script to source
          echo "NOTION_API_KEY=$NOTION_API_KEY" > .env
          echo "NOTION_DATABASE_ID=$NOTION_DATABASE_ID" >> .env
          ./scripts/check-reminders.sh

      - name: Upload signal file
        if: hashFiles('/tmp/reminder-signal.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: reminder-signal-${{ github.run_id }}
          path: /tmp/reminder-signal.json
          retention-days: 1
